<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#23281f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="午餐訂便當">
<meta name="mobile-web-app-capable" content="yes">
<title>2026年8月午餐訂購</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@600;700;900&family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<style>
:root{
  --ink:#23281f;
  --ink-soft:#3a4232;
  --paper:#f2efe4;
  --paper-2:#e9e4d3;
  --card:#fffdf6;
  --accent:#d6a419;
  --accent-deep:#a9800f;
  --chili:#a13d2c;
  --line:#d8d2bf;
  --muted:#7a7563;
  --radius:14px;
  --shadow: 0 2px 0 rgba(35,40,31,0.06), 0 10px 24px -14px rgba(35,40,31,0.35);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--paper);
  background-image:
    radial-gradient(circle at 1px 1px, rgba(35,40,31,0.06) 1px, transparent 0);
  background-size: 22px 22px;
  color:var(--ink);
  font-family:'Noto Sans TC','PingFang TC','Microsoft JhengHei',sans-serif;
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
}
a{color:inherit;}
.wrap{max-width:1040px;margin:0 auto;padding:28px 20px 120px;}

/* ---------- header ---------- */
header.top{
  display:flex;justify-content:space-between;align-items:flex-end;gap:16px;
  border-bottom:3px solid var(--ink);
  padding-bottom:18px;margin-bottom:26px;flex-wrap:wrap;
}
.eyebrow{
  font-size:12px;letter-spacing:.28em;text-transform:uppercase;color:var(--accent-deep);
  font-weight:700;margin-bottom:6px;
}
h1{
  font-family:'Noto Serif TC',serif;font-weight:900;
  font-size:clamp(28px,4.4vw,42px);margin:0;line-height:1.15;letter-spacing:.02em;
}
h1 .accent{color:var(--chili);}
.top-right{text-align:right;font-size:13px;color:var(--muted);line-height:1.6;}
.top-right b{color:var(--ink);}

/* ---------- name field ---------- */
.namebar{
  display:flex;align-items:center;gap:12px;background:var(--card);
  border:1.5px solid var(--ink);border-radius:var(--radius);
  padding:12px 16px;margin-bottom:22px;box-shadow:var(--shadow);
  flex-wrap:wrap;
}
.namebar label{font-weight:700;font-size:14px;white-space:nowrap;}
.namebar input{
  flex:1;min-width:140px;border:none;border-bottom:2px solid var(--line);
  background:transparent;font-size:16px;font-family:inherit;padding:6px 4px;
  color:var(--ink);outline:none;
}
.namebar input:focus{border-bottom-color:var(--accent);}

/* ---------- calendar strip (ticket tabs) ---------- */
.cal-label{font-weight:700;font-size:14px;margin:0 0 10px 2px;color:var(--ink-soft);}
.calendar{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(96px,1fr));
  gap:10px;margin-bottom:30px;
}
.day-chip{
  position:relative;
  background:var(--card);
  border:1.5px solid var(--ink);
  border-radius:10px;
  padding:10px 8px 12px;
  cursor:pointer;
  text-align:center;
  transition:transform .12s ease, box-shadow .12s ease;
  box-shadow:2px 2px 0 var(--ink);
}
.day-chip:hover{transform:translate(-1px,-1px);box-shadow:3px 3px 0 var(--ink);}
.day-chip:before,.day-chip:after{
  content:"";position:absolute;top:50%;width:10px;height:10px;
  background:var(--paper);border:1.5px solid var(--ink);border-radius:50%;
  transform:translateY(-50%);
}
.day-chip:before{left:-6px;}
.day-chip:after{right:-6px;}
.day-chip .dow{font-size:11px;color:var(--muted);font-weight:600;letter-spacing:.05em;}
.day-chip .dnum{font-family:'Noto Serif TC',serif;font-weight:900;font-size:22px;line-height:1.3;}
.day-chip .store{
  font-size:11px;font-weight:600;color:var(--ink-soft);
  overflow:hidden;text-overflow:ellipsis;display:-webkit-box;
  -webkit-line-clamp:2;-webkit-box-orient:vertical;min-height:2.6em;
}
.day-chip.selected{
  background:var(--ink);color:var(--paper);border-color:var(--ink);
  box-shadow:2px 2px 0 var(--accent);
}
.day-chip.selected .dow,.day-chip.selected .store{color:#cfd6c2;}
.day-chip.selected .dnum{color:var(--accent);}
.day-chip.today .dnum{position:relative;}
.day-chip.today .dnum:after{
  content:"";position:absolute;left:50%;bottom:-4px;transform:translateX(-50%);
  width:6px;height:6px;border-radius:50%;background:var(--chili);
}

/* ---------- store card ---------- */
.store-card{
  background:var(--card);border:1.5px solid var(--ink);border-radius:var(--radius);
  padding:20px 22px;margin-bottom:22px;box-shadow:var(--shadow);
}
.store-card h2{
  font-family:'Noto Serif TC',serif;font-size:24px;margin:0 0 4px;
  display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;
}
.store-card h2 .tag{
  font-size:11px;background:var(--accent);color:var(--ink);
  padding:3px 9px;border-radius:999px;font-weight:700;letter-spacing:.05em;
}
.store-meta{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:6px 22px;margin-top:12px;font-size:13.5px;color:var(--ink-soft);
}
.store-meta div span.k{color:var(--muted);margin-right:6px;}
.store-note{
  margin-top:12px;padding-top:12px;border-top:1px dashed var(--line);
  font-size:13px;color:var(--chili);font-weight:500;
}

/* ---------- menu ---------- */
.menu-section h3{
  font-family:'Noto Serif TC',serif;font-size:17px;margin:26px 0 10px;
  padding-left:12px;border-left:5px solid var(--accent);
}
.menu-grid{display:flex;flex-direction:column;gap:8px;}
.item-row{
  display:flex;align-items:center;justify-content:space-between;gap:14px;
  background:var(--card);border:1px solid var(--line);border-radius:10px;
  padding:12px 14px;
}
.item-row.active{border-color:var(--accent);box-shadow:0 0 0 2px rgba(214,164,25,0.25) inset;}
.item-info{flex:1;min-width:0;}
.item-name{font-weight:600;font-size:14.5px;}
.item-price{font-size:12.5px;color:var(--muted);margin-top:2px;}
.stepper{display:flex;align-items:center;gap:0;flex-shrink:0;touch-action:manipulation;}
.stepper button{
  width:40px;height:40px;border:1.5px solid var(--ink);background:var(--paper);
  font-size:19px;font-weight:700;cursor:pointer;color:var(--ink);
  display:flex;align-items:center;justify-content:center;
  transition:background .1s;touch-action:manipulation;
  -webkit-tap-highlight-color:transparent;
}
.stepper button:hover{background:var(--accent);}
.stepper button:active{background:var(--accent);}
.stepper button:first-child{border-radius:8px 0 0 8px;}
.stepper button:last-child{border-radius:0 8px 8px 0;}
.stepper .qty{
  width:38px;text-align:center;font-weight:700;font-size:15px;
  border-top:1.5px solid var(--ink);border-bottom:1.5px solid var(--ink);
  height:40px;line-height:40px;background:var(--card);
}

/* ---------- cart / summary ---------- */
.cart-bar{
  position:sticky;bottom:0;left:0;right:0;
  margin-top:30px;
  background:var(--ink);color:var(--paper);
  border-radius:var(--radius) var(--radius) 0 0;
  box-shadow:0 -8px 24px rgba(0,0,0,.25);
}
.cart-summary{
  display:flex;align-items:center;justify-content:space-between;gap:16px;
  padding:16px 22px;flex-wrap:wrap;
}
.cart-summary .count{font-size:13px;color:#c9cdb9;}
.cart-summary .total{font-family:'Noto Serif TC',serif;font-size:24px;font-weight:900;color:var(--accent);}
.cart-summary .total small{font-size:13px;color:#c9cdb9;font-weight:500;}
.cart-actions{display:flex;gap:10px;}
.btn{
  border:none;border-radius:999px;padding:11px 22px;font-weight:700;font-size:14px;
  cursor:pointer;font-family:inherit;transition:transform .1s;
}
.btn:active{transform:scale(.97);}
.btn-primary{background:var(--accent);color:var(--ink);}
.btn-primary:hover{background:#e6b52a;}
.btn-ghost{background:transparent;color:var(--paper);border:1.5px solid #565f4b;}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent);}
.cart-detail{
  max-height:0;overflow:hidden;transition:max-height .25s ease;
  border-top:1px solid #3a4232;
}
.cart-detail.open{max-height:340px;overflow-y:auto;}
.cart-detail ul{list-style:none;margin:0;padding:14px 22px;display:flex;flex-direction:column;gap:8px;}
.cart-detail li{display:flex;justify-content:space-between;font-size:13.5px;gap:10px;}
.cart-detail li .n{color:#e6e3d4;}
.cart-detail li .p{color:var(--accent);font-weight:700;white-space:nowrap;}

.empty-note{
  text-align:center;padding:60px 20px;color:var(--muted);font-size:14px;
}

/* ---------- order modal ---------- */
.modal-backdrop{
  position:fixed;inset:0;background:rgba(35,40,31,.55);
  display:none;align-items:center;justify-content:center;padding:20px;z-index:50;
}
.modal-backdrop.open{display:flex;}
.modal{
  background:var(--card);border-radius:var(--radius);max-width:480px;width:100%;
  padding:24px;box-shadow:var(--shadow);max-height:86vh;display:flex;flex-direction:column;
}
.modal h3{font-family:'Noto Serif TC',serif;margin:0 0 12px;font-size:20px;}
.modal textarea{
  flex:1;min-height:260px;border:1.5px solid var(--line);border-radius:10px;
  padding:12px;font-family:'Noto Sans TC',monospace;font-size:13px;line-height:1.7;
  resize:vertical;background:var(--paper);color:var(--ink);
}
.btn-ghost-dark{
  background:transparent;color:var(--ink);border:1.5px solid var(--ink);
  border-radius:999px;padding:9px 18px;font-weight:700;font-size:13px;
  cursor:pointer;font-family:inherit;
}
.btn-ghost-dark:hover{background:var(--ink);color:var(--paper);}
.orders-toggle-row{margin-bottom:10px;}
.orders-panel{
  display:none;background:var(--card);border:1.5px solid var(--ink);border-radius:var(--radius);
  padding:16px 20px;margin-bottom:22px;box-shadow:var(--shadow);
}
.orders-panel.open{display:block;}
.orders-panel h4{font-family:'Noto Serif TC',serif;margin:0 0 10px;font-size:16px;display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;}
.orders-panel h4 .live-dot{
  display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--chili);
  margin-right:6px;animation:pulse 1.6s infinite;
}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
.orders-panel .grand-total{color:var(--accent-deep);font-weight:900;}
.orders-list{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:8px;}
.orders-list li{
  border:1px solid var(--line);border-radius:10px;padding:10px 12px;font-size:13px;
}
.orders-list .row1{display:flex;justify-content:space-between;font-weight:700;}
.orders-list .row2{color:var(--muted);margin-top:3px;font-size:12.5px;line-height:1.6;}
.orders-empty{color:var(--muted);font-size:13px;text-align:center;padding:10px 0;}
.orders-status{font-size:12px;color:var(--muted);margin-bottom:10px;}

.modal-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:14px;flex-wrap:wrap;}
.copied-note{font-size:12.5px;color:var(--chili);margin-top:8px;min-height:1.2em;font-weight:600;}

footer.foot{text-align:center;color:var(--muted);font-size:12px;margin-top:50px;line-height:1.8;}

@media (max-width:560px){
  .top-right{text-align:left;}
  .cart-summary{padding:14px 16px;}
  .wrap{padding:18px 14px 130px;}
  h1{font-size:26px;}
  .calendar{grid-template-columns:repeat(3,1fr);gap:8px;}
  .day-chip{padding:9px 6px 10px;}
  .day-chip:before,.day-chip:after{display:none;}
  .store-card{padding:16px 16px;}
  .item-row{padding:11px 12px;}
  .btn{padding:12px 18px;}
  .modal{padding:18px;max-height:92vh;}
}

</style>
</head>
<body>
<div class="wrap">

  <header class="top">
    <div>
      <div class="eyebrow">Lunch Box Order</div>
      <h1>午餐訂便當<span class="accent">．</span>2026年8月</h1>
    </div>
    <div class="top-right">
      每日 <b>09:30</b> 截單，逾時不候<br>
      請於菜單內填寫欲訂購數量
    </div>
  </header>

  <div class="namebar">
    <label for="orderer-name">訂購人姓名</label>
    <input id="orderer-name" type="text" placeholder="請輸入您的姓名（送出訂單時會用到）">
  </div>

  <div class="cal-label">選擇日期</div>
  <div class="calendar" id="calendar"></div>

  <div class="orders-toggle-row">
    <button class="btn btn-ghost-dark" id="toggle-orders-btn">📋 查看本日所有人的訂單</button>
  </div>
  <div class="orders-panel" id="orders-panel"></div>

  <div id="content"></div>

</div>

<div class="cart-bar" id="cart-bar" style="display:none;">
  <div class="cart-summary" id="cart-toggle">
    <div>
      <div class="count" id="cart-count">尚未選購品項</div>
      <div class="total">$<span id="cart-total">0</span> <small>合計</small></div>
    </div>
    <div class="cart-actions">
      <button class="btn btn-ghost" id="clear-btn">清空</button>
      <button class="btn btn-primary" id="submit-btn">產生訂單</button>
    </div>
  </div>
  <div class="cart-detail" id="cart-detail"><ul id="cart-list"></ul></div>
</div>

<div class="modal-backdrop" id="modal-backdrop">
  <div class="modal">
    <h3>訂單內容</h3>
    <textarea id="order-text" readonly></textarea>
    <div class="copied-note" id="copied-note">&nbsp;</div>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="modal-close">關閉</button>
      <button class="btn btn-ghost" id="copy-btn">複製文字</button>
      <button class="btn btn-primary" id="send-btn">送出訂單（存入雲端）</button>
    </div>
  </div>
</div>

<footer class="foot">
  資料整理自公司便當訂購表・如發現店家或菜單有誤，請回報表單管理人員
</footer>

    return y+'-'+m+'-'+dd;
  }

  function fmtDateLabel(iso){
    var parts = iso.split('-');
    var d = new Date(parseInt(parts[0]), parseInt(parts[1])-1, parseInt(parts[2]));
    return { day: parseInt(parts[2],10), dow: DOW[d.getDay()] };
  }

  function buildCalendar(){

      el.appendChild(chip);
    });

    selectDate(initial);
  }

  function selectDate(iso){
    state.selectedDate = iso;

      c.classList.toggle('selected', c.dataset.date === iso);
    });
    renderContent();
    renderCart();
    refreshOrdersPanel();
  }

  function cartKeyPrefix(){
    return state.selectedDate + '|' + CAL[state.selectedDate] + '|';
  }

    var k = cartKeyPrefix() + idx;

    if (qty <= 0){
      delete state.cart[k];
    } else {
      state.cart[k] = {
        date: state.selectedDate,
        store: CAL[state.selectedDate],
        name: item.n,
        category: item.c,
        price: item.p,
        qty: qty
      };
    }
  }

  function renderContent(){
    var el = document.getElementById('content');
    el.innerHTML = '';
    var iso = state.selectedDate;
    var storeName = CAL[iso];
    if (!storeName){
      el.innerHTML = '<div class="empty-note">這天沒有訂購喔，請選擇其他日期。</div>';
      return;
    }
    var store = STORES[storeName] || {};
    var items = MENUS[storeName] || [];
    var info = fmtDateLabel(iso);

    var card = document.createElement('div');
    card.className = 'store-card';
    var metaHTML = '';
    if (store.phone) metaHTML += '<div><span class="k">電話</span>'+store.phone+'</div>';
    if (store.mobile) metaHTML += '<div><span class="k">手機</span>'+store.mobile+'</div>';
    if (store.address) metaHTML += '<div><span class="k">地址</span>'+store.address+'</div>';
    if (store.closed) metaHTML += '<div><span class="k">公休</span>'+store.closed+'</div>';
    if (store.min_order) metaHTML += '<div><span class="k">最低外送</span>'+store.min_order+'</div>';

    card.innerHTML =
      '<h2>'+storeName+'<span class="tag">'+iso+'（週'+info.dow+'）</span></h2>'+
      '<div class="store-meta">'+metaHTML+'</div>'+
      (store.note ? '<div class="store-note">＊ '+store.note+'</div>' : '');
    el.appendChild(card);

    // group items by category, preserving order of first appearance.
    // items with no category (c === null) are bundled into one unlabeled group.
    var groups = [];
    var groupMap = {};
    var FLAT_KEY = '__flat__';
    items.forEach(function(item, idx){
      var key = item.c === null ? FLAT_KEY : item.c;
      if (!groupMap[key]){
        groupMap[key] = { name: item.c, items: [] };
        groups.push(groupMap[key]);
      }
      groupMap[key].items.push({ item: item, idx: idx });
    });

    groups.forEach(function(group){
      var section = document.createElement('div');
      section.className = 'menu-section';
      if (group.name !== null){
        var h3 = document.createElement('h3');
        h3.textContent = group.name;
        section.appendChild(h3);
      }
      var grid = document.createElement('div');
      grid.className = 'menu-grid';
      if (group.name === null) grid.style.marginTop = '4px';

      group.items.forEach(function(pair){
        var item = pair.item, idx = pair.idx;
        var qty = getQty(idx);
        var row = document.createElement('div');
        row.className = 'item-row' + (qty > 0 ? ' active' : '');
        row.innerHTML =
          '<div class="item-info">'+
            '<div class="item-name">'+item.n+'</div>'+
            '<div class="item-price">$'+item.p+'</div>'+
          '</div>'+
          '<div class="stepper">'+
            '<button data-act="minus" data-idx="'+idx+'">－</button>'+
            '<div class="qty" data-qty="'+idx+'">'+qty+'</div>'+
            '<button data-act="plus" data-idx="'+idx+'">＋</button>'+
          '</div>';
        grid.appendChild(row);
      });
      section.appendChild(grid);
      el.appendChild(section);
    });

    el.addEventListener('click', onStepperClick);
  }

  function onStepperClick(e){
    var btn = e.target.closest('button[data-act]');
    if (!btn) return;
    var idx = parseInt(btn.dataset.idx, 10);
    var items = MENUS[CAL[state.selectedDate]] || [];
    var item = items[idx];
    var cur = getQty(idx);
    var next = btn.dataset.act === 'plus' ? cur + 1 : Math.max(0, cur - 1);
    setQty(idx, item, next);

    var qtyEl = document.querySelector('.qty[data-qty="'+idx+'"]');
    if (qtyEl) qtyEl.textContent = next;
    var row = btn.closest('.item-row');
    if (row) row.classList.toggle('active', next > 0);

    renderCart();
  }

  function allCartEntries(){
    return Object.keys(state.cart).map(function(k){ return state.cart[k]; });
  }

  function renderCart(){
    var entries = allCartEntries();
    var bar = document.getElementById('cart-bar');
    var countEl = document.getElementById('cart-count');
    var totalEl = document.getElementById('cart-total');
    var listEl = document.getElementById('cart-list');

    if (entries.length === 0){
      bar.style.display = 'none';
      document.getElementById('cart-detail').classList.remove('open');
      return;
    }
    bar.style.display = 'block';

    var totalQty = 0, totalPrice = 0;
    listEl.innerHTML = '';
    entries.forEach(function(e){
      totalQty += e.qty;
      totalPrice += e.qty * e.price;
      var li = document.createElement('li');
      li.innerHTML = '<span class="n">'+e.name+' × '+e.qty+'</span><span class="p">$'+(e.qty*e.price)+'</span>';
      listEl.appendChild(li);
    });
    countEl.textContent = '已選 '+entries.length+' 項・共 '+totalQty+' 份';
    totalEl.textContent = totalPrice;
  }

  function buildOrderText(){
    var iso = state.selectedDate;
    var info = fmtDateLabel(iso);
    var storeName = CAL[iso];
    var name = document.getElementById('orderer-name').value.trim() || '（未填寫姓名）';
    var entries = allCartEntries().filter(function(e){ return e.date === iso; });
    var lines = [];
    lines.push('【午餐訂購】');
    lines.push('日期：'+iso+'（週'+info.dow+'）');
    lines.push('店家：'+storeName);
    lines.push('姓名：'+name);
    lines.push('－－－－－－－－');
    var total = 0;
    if (entries.length === 0){
      lines.push('（尚未勾選任何品項）');
    } else {
      entries.forEach(function(e){
        var sub = e.qty * e.price;
        total += sub;
        lines.push(e.name+'  x'+e.qty+'  = $'+sub);
      });
    }
    lines.push('－－－－－－－－');
    lines.push('總計：$'+total);
    return lines.join('\n');
  }

  function openModal(){
    document.getElementById('order-text').value = buildOrderText();
    document.getElementById('copied-note').textContent = '\u00A0';
    document.getElementById('send-btn').disabled = false;
    document.getElementById('send-btn').textContent = '送出訂單（存入雲端）';
    document.getElementById('modal-backdrop').classList.add('open');
  }
  function closeModal(){
    document.getElementById('modal-backdrop').classList.remove('open');
  }

  // ---------------- Firestore: submit order ----------------
  function submitOrder(){
    var iso = state.selectedDate;
    var storeName = CAL[iso];
    var name = document.getElementById('orderer-name').value.trim();
    var entries = allCartEntries().filter(function(e){ return e.date === iso; });

    if (!name){
      document.getElementById('copied-note').textContent = '請先在上方填寫您的姓名，才能送出訂單。';
      return;
    }
    if (entries.length === 0){
      document.getElementById('copied-note').textContent = '尚未勾選任何品項，請先選購再送出。';
      return;
    }
    if (!db){
      document.getElementById('copied-note').textContent = '尚未設定 Firebase，請見 firebase-config.js 說明。';
      return;
    }

    var total = entries.reduce(function(s,e){ return s + e.qty*e.price; }, 0);
    var items = entries.map(function(e){ return { name: e.name, qty: e.qty, price: e.price }; });

    var btn = document.getElementById('send-btn');
    btn.disabled = true;
    btn.textContent = '送出中…';

    db.collection('orders').add({
      date: iso,
      store: storeName,
      name: name,
      items: items,
      total: total,
      ts: firebase.firestore.FieldValue.serverTimestamp()
    }).then(function(){
      document.getElementById('copied-note').textContent = '訂單已送出，主管可即時看到囉！';
      btn.textContent = '已送出 ✓';
    }).catch(function(err){
      document.getElementById('copied-note').textContent = '送出失敗：' + err.message;
      btn.disabled = false;
      btn.textContent = '送出訂單（存入雲端）';
    });
  }

  // ---------------- Firestore: live "today's orders" panel ----------------
  var ordersPanelOpen = false;
  var ordersUnsub = null;

  function refreshOrdersPanel(){
    if (!ordersPanelOpen) return;
    subscribeOrders(state.selectedDate);
  }

  function subscribeOrders(iso){
    if (ordersUnsub){ ordersUnsub(); ordersUnsub = null; }
    var panel = document.getElementById('orders-panel');
    if (!db){
      panel.innerHTML = '<div class="orders-status">尚未設定 Firebase，請見 firebase-config.js 說明後即可使用此功能。</div>';
      return;
    }
    panel.innerHTML = '<div class="orders-status">讀取中…</div>';
    ordersUnsub = db.collection('orders').where('date', '==', iso)
      .onSnapshot(function(snap){
        var orders = [];
        snap.forEach(function(doc){ orders.push(doc.data()); });
        orders.sort(function(a,b){
          var ta = (a.ts && a.ts.toMillis) ? a.ts.toMillis() : 0;
          var tb = (b.ts && b.ts.toMillis) ? b.ts.toMillis() : 0;
          return ta - tb;
        });
        renderOrdersPanel(iso, orders);
      }, function(err){
        panel.innerHTML = '<div class="orders-status">讀取失敗：'+err.message+'</div>';
      });
  }

  function renderOrdersPanel(iso, orders){
    var panel = document.getElementById('orders-panel');
    var info = fmtDateLabel(iso);
    var grand = orders.reduce(function(s,o){ return s + (o.total||0); }, 0);
    var html = '<h4><span><span class="live-dot"></span>'+iso+'（週'+info.dow+'）即時訂單・共 '+orders.length+' 筆</span>'+
      '<span class="grand-total">$'+grand+'</span></h4>';
    if (orders.length === 0){
      html += '<div class="orders-empty">目前還沒有人送出這天的訂單。</div>';
    } else {
      html += '<ul class="orders-list">';
      orders.forEach(function(o){
        var itemsStr = (o.items||[]).map(function(it){ return it.name+' x'+it.qty; }).join('、');
        html += '<li><div class="row1"><span>'+o.name+'</span><span>$'+o.total+'</span></div>'+
          '<div class="row2">'+itemsStr+'</div></li>';
      });
      html += '</ul>';
    }
    panel.innerHTML = html;
  }

  document.getElementById('cart-toggle').addEventListener('click', function(e){
    if (e.target.closest('.btn')) return;
    document.getElementById('cart-detail').classList.toggle('open');
  });
  document.getElementById('clear-btn').addEventListener('click', function(){
    var prefix = cartKeyPrefix();
    Object.keys(state.cart).forEach(function(k){
      if (k.indexOf(prefix) === 0) delete state.cart[k];
    });
    renderContent();
    renderCart();
  });
  document.getElementById('submit-btn').addEventListener('click', openModal);
  document.getElementById('modal-close').addEventListener('click', closeModal);
  document.getElementById('modal-backdrop').addEventListener('click', function(e){
    if (e.target === this) closeModal();
  });
  document.getElementById('copy-btn').addEventListener('click', function(){
    var ta = document.getElementById('order-text');
    ta.select();
    var ok = false;
    try {
      if (navigator.clipboard && navigator.clipboard.writeText){
        navigator.clipboard.writeText(ta.value);
        ok = true;
      } else {
        ok = document.execCommand('copy');
      }
    } catch(err){ ok = false; }
    document.getElementById('copied-note').textContent = ok ? '已複製到剪貼簿，可貼到 LINE / Email 送出！' : '複製失敗，請手動選取文字複製。';
  });
  document.getElementById('send-btn').addEventListener('click', submitOrder);
  document.getElementById('toggle-orders-btn').addEventListener('click', function(){
    ordersPanelOpen = !ordersPanelOpen;
    var panel = document.getElementById('orders-panel');
    panel.classList.toggle('open', ordersPanelOpen);
    this.textContent = ordersPanelOpen ? '收合本日訂單清單' : '📋 查看本日所有人的訂單';
    if (ordersPanelOpen){
      subscribeOrders(state.selectedDate);
    } else if (ordersUnsub){
      ordersUnsub(); ordersUnsub = null;
    }
  });

  buildCalendar();
})();

</script>
</body>
</html>
