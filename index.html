<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#1C1917;--ink2:#57534E;--ink3:#A8A29E;
  --bg:#FAFAF8;--card:#FFFFFF;--line:#E7E5E4;
  --accent:#C2410C;--accent-bg:#FFF7ED;
  --green:#15803D;--green-bg:#F0FDF4;
  --blue:#1D4ED8;--blue-bg:#EFF6FF;
}
body{font-family:'PingFang TC','Microsoft JhengHei',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh}

/* ─ Header ─ */
.site-header{
  background:var(--ink);color:#fff;
  padding:16px 24px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:200;
}
.site-title{font-size:15px;font-weight:700;letter-spacing:.06em;text-transform:uppercase}
.site-subtitle{font-size:12px;color:#A8A29E;margin-top:2px}
.header-notice{font-size:12px;color:#FCA5A5;background:rgba(220,38,38,.15);border-radius:4px;padding:4px 10px}

/* ─ Tabs ─ */
.tabs-bar{
  background:#fff;border-bottom:1px solid var(--line);
  padding:0 24px;display:flex;gap:0;overflow-x:auto;
  position:sticky;top:57px;z-index:190;
  scrollbar-width:none;
}
.tabs-bar::-webkit-scrollbar{display:none}
.tab-btn{
  flex-shrink:0;padding:14px 18px;
  font-size:13px;font-weight:500;color:var(--ink2);
  background:none;border:none;border-bottom:2px solid transparent;
  cursor:pointer;white-space:nowrap;transition:color .15s;
  font-family:inherit;
}
.tab-btn:hover{color:var(--ink)}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:700}

/* ─ Views ─ */
.view{display:none;padding:20px 24px 60px}
.view.active{display:block}

/* ─ Calendar ─ */
.month-label{font-size:11px;font-weight:700;color:var(--ink3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:12px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:24px}
.cal-head{font-size:11px;font-weight:600;color:var(--ink3);text-align:center;padding:6px 0}
.cal-head.weekend{color:#EF4444}
.cal-day{
  border-radius:8px;border:1px solid var(--line);
  background:#fff;padding:8px 6px;min-height:72px;
  display:flex;flex-direction:column;gap:4px;cursor:pointer;
  transition:border-color .12s,box-shadow .12s;
}
.cal-day:hover{border-color:var(--accent);box-shadow:0 0 0 3px rgba(194,65,12,.08)}
.cal-day.today{border-color:var(--accent);background:var(--accent-bg)}
.cal-day.off{background:#F5F5F4;cursor:default;opacity:.55}
.cal-day.off:hover{border-color:var(--line);box-shadow:none}
.cal-day.empty{border:none;background:transparent;cursor:default}
.cal-day.empty:hover{box-shadow:none}
.cal-date{font-size:11px;font-weight:700;color:var(--ink2)}
.cal-shop{font-size:11px;color:var(--ink);line-height:1.4}
.cal-day.today .cal-date{color:var(--accent)}
.cal-day[data-clickable="1"]{cursor:pointer}
.cal-day.has-order{border-color:var(--green);background:var(--green-bg)}
.cal-day.has-order .cal-date{color:var(--green)}
.off-label{font-size:10px;color:var(--ink3)}

/* ─ Order Panel ─ */
.order-header{
  display:flex;align-items:flex-start;justify-content:space-between;
  margin-bottom:20px;flex-wrap:wrap;gap:10px;
}
.order-shop-name{font-size:22px;font-weight:800;color:var(--ink)}
.order-date-label{font-size:13px;color:var(--ink3);margin-top:3px}
.btn-back{
  background:none;border:1px solid var(--line);
  border-radius:6px;padding:7px 14px;font-size:13px;
  cursor:pointer;font-family:inherit;color:var(--ink2);
  display:flex;align-items:center;gap:6px;
  transition:background .12s;flex-shrink:0;
}
.btn-back:hover{background:var(--line)}

.person-select-bar{
  background:#fff;border:1px solid var(--line);border-radius:10px;
  padding:14px 16px;margin-bottom:18px;
}
.person-select-label{font-size:12px;font-weight:600;color:var(--ink3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px}
.person-chips{display:flex;flex-wrap:wrap;gap:6px}
.person-chip{
  padding:5px 12px;border-radius:20px;border:1px solid var(--line);
  font-size:13px;cursor:pointer;background:#fff;
  transition:all .12s;font-family:inherit;color:var(--ink);
}
.person-chip:hover{border-color:var(--accent);color:var(--accent)}
.person-chip.selected{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}

.menu-section{margin-bottom:20px}
.menu-cat{
  font-size:11px;font-weight:700;color:var(--ink3);
  text-transform:uppercase;letter-spacing:.08em;
  padding:10px 0 6px;border-top:1px solid var(--line);
  margin-top:4px;
}
.menu-cat:first-child{border-top:none;padding-top:0}
.menu-item{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 12px;border-radius:8px;margin-bottom:4px;
  background:#fff;border:1px solid var(--line);
  transition:border-color .12s;
}
.menu-item:hover{border-color:var(--accent)}
.menu-item-name{font-size:14px;color:var(--ink);flex:1}
.menu-item-sub{font-size:11px;color:var(--ink3);margin-top:1px}
.menu-item-price{font-size:13px;font-weight:700;color:var(--accent);margin:0 12px;white-space:nowrap}
.menu-item-qty{display:flex;align-items:center;gap:8px}
.qty-btn{
  width:28px;height:28px;border-radius:50%;border:1px solid var(--line);
  background:#fff;font-size:16px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .12s;line-height:1;font-family:inherit;color:var(--ink2);
}
.qty-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-bg)}
.qty-num{font-size:14px;font-weight:700;min-width:20px;text-align:center;color:var(--ink)}
.qty-num.nonzero{color:var(--accent)}

/* ─ Order Summary ─ */
.order-summary{
  background:#fff;border:1px solid var(--line);border-radius:10px;
  padding:16px;margin-top:20px;
}
.summary-title{font-size:12px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px}
.summary-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-top:1px solid var(--line)}
.summary-row:first-of-type{border-top:none}
.summary-person{font-size:14px;color:var(--ink)}
.summary-items{font-size:12px;color:var(--ink2);margin-top:2px}
.summary-amount{font-size:14px;font-weight:700;color:var(--ink);white-space:nowrap}
.summary-total{
  margin-top:10px;padding-top:10px;border-top:2px solid var(--ink);
  display:flex;justify-content:space-between;align-items:center;
}
.summary-total-label{font-size:13px;font-weight:700;color:var(--ink)}
.summary-total-amount{font-size:20px;font-weight:800;color:var(--accent)}

.action-row{display:flex;gap:10px;margin-top:16px;flex-wrap:wrap}
.btn-primary{
  background:var(--accent);color:#fff;border:none;
  border-radius:8px;padding:11px 22px;font-size:14px;font-weight:600;
  cursor:pointer;font-family:inherit;transition:background .12s;
}
.btn-primary:hover{background:#9A3412}
.btn-outline{
  background:none;color:var(--ink);border:1px solid var(--line);
  border-radius:8px;padding:11px 22px;font-size:14px;font-weight:500;
  cursor:pointer;font-family:inherit;transition:background .12s;
}
.btn-outline:hover{background:var(--line)}
.btn-sm{
  background:none;border:1px solid var(--line);border-radius:6px;
  padding:6px 12px;font-size:13px;cursor:pointer;font-family:inherit;
  color:var(--ink2);transition:background .12s;
}
.btn-sm:hover{background:var(--line)}

/* ─ Today panel ─ */
.today-band{
  background:var(--accent-bg);border:1px solid #FDBA74;
  border-radius:10px;padding:14px 18px;margin-bottom:20px;
  display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;
}
.today-info .label{font-size:11px;color:var(--accent);font-weight:700;text-transform:uppercase;letter-spacing:.06em}
.today-info .shop{font-size:18px;font-weight:800;color:var(--ink);margin-top:2px}
.today-info .date{font-size:13px;color:var(--ink2);margin-top:2px}
.btn-today-order{
  background:var(--accent);color:#fff;border:none;
  border-radius:8px;padding:10px 20px;font-size:14px;font-weight:600;
  cursor:pointer;font-family:inherit;white-space:nowrap;
}
.btn-today-order:hover{background:#9A3412}

/* ─ Toast ─ */
.toast{
  position:fixed;bottom:24px;left:50%;
  transform:translateX(-50%) translateY(80px);
  background:var(--ink);color:#fff;padding:10px 22px;
  border-radius:8px;font-size:14px;transition:transform .25s;
  pointer-events:none;z-index:999;white-space:nowrap;
}
.toast.show{transform:translateX(-50%) translateY(0)}

/* ─ Empty state ─ */
.empty{text-align:center;padding:40px 20px;color:var(--ink3);font-size:14px}

/* ─ Payment Tab ─ */
.payment-date-selector{
  background:#fff;border:1px solid var(--line);border-radius:10px;
  padding:14px 16px;margin-bottom:18px;
}
.payment-date-label{font-size:12px;font-weight:600;color:var(--ink3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px}
.date-chips{display:flex;flex-wrap:wrap;gap:6px}
.date-chip{
  padding:5px 14px;border-radius:20px;border:1px solid var(--line);
  font-size:13px;cursor:pointer;background:#fff;
  transition:all .12s;font-family:inherit;color:var(--ink);
}
.date-chip:hover{border-color:var(--accent);color:var(--accent)}
.date-chip.selected{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}

.payment-stats{
  display:flex;gap:0;margin-bottom:18px;
  background:#fff;border:1px solid var(--line);border-radius:10px;overflow:hidden;
}
.payment-stat{flex:1;padding:14px 16px;text-align:center;border-right:1px solid var(--line)}
.payment-stat:last-child{border-right:none}
.payment-stat-label{font-size:11px;color:var(--ink3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.payment-stat-value{font-size:20px;font-weight:800}
.payment-stat-value.green{color:var(--green)}
.payment-stat-value.orange{color:#EA580C}
.payment-stat-value.blue{color:var(--blue)}

.payment-list{background:#fff;border:1px solid var(--line);border-radius:10px;overflow:hidden}
.payment-list-header{
  display:grid;grid-template-columns:1fr 2fr 80px 70px;
  padding:10px 16px;background:#F5F5F4;
  font-size:11px;font-weight:700;color:var(--ink3);
  text-transform:uppercase;letter-spacing:.05em;gap:8px;
}
.payment-row{
  display:grid;grid-template-columns:1fr 2fr 80px 70px;
  padding:12px 16px;border-top:1px solid var(--line);
  align-items:center;gap:8px;transition:background .1s;
}
.payment-row:hover{background:#FAFAF8}
.payment-row.paid-row{background:var(--green-bg)}
.payment-row.paid-row:hover{background:#E2F8E8}
.payment-name{font-size:14px;font-weight:500}
.payment-items{font-size:12px;color:var(--ink2);line-height:1.5}
.payment-amount{font-size:14px;font-weight:700;text-align:right}
.pay-toggle{display:flex;justify-content:center}
.pay-toggle label{display:flex;align-items:center;gap:6px;cursor:pointer}
.pay-toggle input[type=checkbox]{display:none}
.pay-box{
  width:24px;height:24px;border-radius:6px;border:2px solid var(--line);
  display:flex;align-items:center;justify-content:center;
  background:#fff;transition:all .15s;flex-shrink:0;
}
.pay-toggle input:checked~.pay-box{background:var(--green);border-color:var(--green)}
.pay-box svg{display:none}
.pay-toggle input:checked~.pay-box svg{display:block}

.unpaid-banner{
  margin-top:16px;background:#FFF7ED;border:1px solid #FED7AA;
  border-radius:10px;padding:14px 16px;
}
.unpaid-banner-title{font-size:12px;font-weight:700;color:#EA580C;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
.unpaid-chips-wrap{display:flex;flex-wrap:wrap;gap:6px}
.unpaid-chip{
  background:#fff;border:1px solid #FED7AA;border-radius:20px;
  padding:4px 12px;font-size:13px;color:#EA580C;
}

@media(max-width:640px){
  .payment-list-header,.payment-row{grid-template-columns:1fr 1.5fr 70px 60px}
}

@media(max-width:640px){
  .cal-grid{gap:3px}
  .cal-day{min-height:60px;padding:5px 4px}
  .cal-shop{font-size:10px}
  .tabs-bar{padding:0 12px}
  .view{padding:14px 12px 60px}
  .order-shop-name{font-size:18px}
}
</style>
</head>

// ══════════════════════════════════════════════════
let orders = {};
let extraPeopleByDate = {};
let paid = {};
let orderNotes = {};
let currentDate = null;
let currentPerson = null;
let dbReady = false;

// ── Firebase 讀取 / 監聽 ──────────────────────────
function initFirebase(){
  showLoading(true);
  // 監聽三個節點，任何人更新都會即時同步
  db.ref('orders').on('value', snap=>{
    const raw = snap.val()||{};
    // Firebase key 用底線取代連字號，讀回來要還原
    orders = {};
    Object.entries(raw).forEach(([safeDate, persons])=>{
      const date = safeDate.replace(/_/g,'-');
      orders[date] = {};
      if(persons) Object.entries(persons).forEach(([safePerson, items])=>{
        // Firebase 有時把 array 存成 object，需要轉回 array
        if(Array.isArray(items)){
          orders[date][safePerson] = items;
        } else if(items && typeof items === 'object'){
          orders[date][safePerson] = Object.values(items);
        } else {
          orders[date][safePerson] = [];
        }
      });
    });
    if(document.querySelector('[data-tab="order"].active')) renderOrderTab();
    if(document.querySelector('[data-tab="summary"].active')) renderSummaryTab();
    if(document.querySelector('[data-tab="payment"].active')) renderPaymentTab();
    refreshCalendarBadges();
  });
  db.ref('extra').on('value', snap=>{
    extraPeopleByDate = snap.val()||{};
  });
  db.ref('orderNotes').on('value', snap=>{
    const raw = snap.val()||{};
    // 和 orders 一樣：Firebase key 用底線存日期，讀回來要還原成連字號
    orderNotes = {};
    Object.entries(raw).forEach(([safeDate, persons])=>{
      const date = safeDate.replace(/_/g,'-');
      orderNotes[date] = persons || {};
    });
    if(document.querySelector('[data-tab="order"].active')) renderOrderTab();
    if(document.querySelector('[data-tab="summary"].active')) renderSummaryTab();
    if(document.querySelector('[data-tab="payment"].active')) renderPaymentTab();
  });
  db.ref('paid').on('value', snap=>{
    paid = snap.val()||{};
    if(document.querySelector('[data-tab="payment"].active')) renderPaymentTab();
  });
  db.ref('.info/connected').on('value', snap=>{
    const connected=snap.val();
    showLoading(!connected);
    dbReady=connected;
    if(connected) showToast('✅ 已連線');
  });
}

function showLoading(show){
  let el=document.getElementById('loading-bar');
  if(!el){
    el=document.createElement('div');
    el.id='loading-bar';
    el.style.cssText='position:fixed;top:0;left:0;width:100%;height:3px;background:#C2410C;z-index:999;transition:opacity .3s';
    document.body.prepend(el);
  }
  el.style.opacity=show?'1':'0';
}

// ── Firebase 寫入（逐筆，不整批覆蓋）────────────────
function savePersonOrder(date, person){
  const safePerson = person.replace(/[.#$[\]]/g,'_');
  const safeDate = date.replace(/-/g,'_');
  const data = (orders[date]&&orders[date][person]) ? orders[date][person] : [];
  db.ref(`orders/${safeDate}/${safePerson}`).set(data.length ? data : null)
    .catch(e=>showToast('儲存失敗：'+e.message));
}
function saveOrders(){
  // 只在清空整天時使用
  if(currentDate){
    const safeDate = currentDate.replace(/-/g,'_');
    db.ref(`orders/${safeDate}`).set(null).catch(e=>showToast('儲存失敗：'+e.message));
  }
}
function saveExtra(){
  db.ref('extra').set(extraPeopleByDate).catch(e=>showToast('儲存失敗：'+e.message));
}
function savePaid(){
  db.ref('paid').set(paid).catch(e=>showToast('儲存失敗：'+e.message));
}

// Firebase 讀取時，key 是 safeDate/safePerson，需要反查
function safeKey(s){ return s.replace(/[.#$[\]]/g,'_'); }
function unsafeDate(s){ return s.replace(/_/g,'-'); }

// 月曆綠點即時更新
function refreshCalendarBadges(){
  document.querySelectorAll('.cal-day[data-date]').forEach(el=>{
    const d=el.dataset.date;
    const has=orders[d]&&Object.values(orders[d]).some(v=>v&&v.length>0);
    el.classList.toggle('has-order',!!has);
  });
}

// 新增臨時人員
function addExtraPerson(date){
  const input=document.getElementById('new-person-input');
  const name=(input?input.value.trim():'');
  if(!name){showToast('請輸入名字');return;}
  const allExisting=[...PEOPLE,...(extraPeopleByDate[date]||[])];
  if(allExisting.includes(name)){showToast(`${name} 已在名單中`);return;}
  if(!extraPeopleByDate[date]) extraPeopleByDate[date]=[];
  extraPeopleByDate[date].push(name);
  saveExtra();
  currentPerson=name;
  renderOrderTab(date);
  showToast(`已新增 ${name}`);
}

function clearDateOrders(date){
  adminCheck(()=>{
    if(!confirm('確定清空 '+date+' 的所有訂單？')) return;
    delete orders[date];
    const safeDate=date.replace(/-/g,'_');
    db.ref(`orders/${safeDate}`).remove().catch(e=>showToast('刪除失敗：'+e.message));
    renderOrderTab(date);
  });
}

function removeExtraPerson(date,name){
  adminCheck(()=>{
    if(!confirm(`確定移除「${name}」？同時會清除其訂單`)) return;
    extraPeopleByDate[date]=(extraPeopleByDate[date]||[]).filter(p=>p!==name);
    saveExtra();
    if(orders[date]) delete orders[date][name];
    const safeDate=date.replace(/-/g,'_');
    const safeName=name.replace(/[.#$[\]]/g,'_');
    db.ref(`orders/${safeDate}/${safeName}`).remove().catch(e=>showToast('刪除失敗：'+e.message));
    if(currentPerson===name) currentPerson=null;
    renderOrderTab(date);
    showToast(`已移除 ${name}`);
  });
}

// 取消某人訂單
function cancelPersonOrder(date,person){
  adminCheck(()=>{
    if(!confirm(`確定取消「${person}」今日所有訂單？`)) return;
    if(orders[date]) delete orders[date][person];
    const safeDate=date.replace(/-/g,'_');
    const safePerson=person.replace(/[.#$[\]]/g,'_');
    db.ref(`orders/${safeDate}/${safePerson}`).remove().catch(e=>showToast('刪除失敗：'+e.message));
    currentPerson=null;
    renderOrderTab(date);
    showToast(`已取消 ${person} 的訂單`);
  });
}

function todayStr(){
  const d=new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function updateDeadline(){
  const now=new Date();
  const deadline=new Date(now);
  deadline.setHours(9,30,0,0);
  const el=document.getElementById('deadline-notice');
  if(now<deadline){
    const diff=Math.floor((deadline-now)/60000);
    el.textContent=`截單倒數 ${diff} 分鐘`;
  } else {
    el.textContent='今日已截單';
    el.style.background='rgba(100,100,100,.2)';
    el.style.color='#ccc';
  }
}

// Calendar
// ══════════════════════════════════════════════════
function renderCalendar(){
  const el=document.getElementById('tab-calendar');
  const today=todayStr();
  const todayShop=SCHEDULE[today];

  let html='';

  // Today band
  if(todayShop){
    html+=`<div class="today-band">
      <div class="today-info">
        <div class="label">今天</div>
        <div class="shop">${todayShop}</div>
        <div class="date">${today.replace('2026-','').replace('-','/')}</div>
      </div>
      <button class="btn-today-order" onclick="openOrderPanel('${today}')">開始訂購</button>
    </div>`;
  }

  html+=`<div class="month-label">2026年8月</div>`;
  html+=`<div class="cal-grid">`;
  // headers
  ['一','二','三','四','五','六','日'].forEach((d,i)=>{
    html+=`<div class="cal-head${i>=5?' weekend':''}">${d}</div>`;
  });

  // August 2026: starts on Saturday (day index 5, Mon=0)
  for(let i=0;i<5;i++) html+=`<div class="cal-day empty"></div>`;

  for(let d=1;d<=31;d++){
    const dateStr=`2026-08-${String(d).padStart(2,'0')}`;
    const dow=(d+1)%7; // 1=Wed...
    const dayOfWeek=new Date(dateStr).getDay(); // 0=Sun,6=Sat
    const isWeekend=dayOfWeek===0||dayOfWeek===6;
    const shop=SCHEDULE[dateStr];
    const isToday=dateStr===today;
    const hasOrder=orders[dateStr]&&Object.values(
      Object.fromEntries(Object.entries(orders[dateStr]))
    ).some(a=>Array.isArray(a)&&a.length>0);

    let cls='cal-day';
    if(isToday) cls+=' today';
    if(isWeekend||!shop) cls+=' off';
    if(hasOrder) cls+=' has-order';

    const clickable=shop&&!isWeekend;
    html+=`<div class="${cls}" data-date="${dateStr}" data-clickable="${clickable?'1':'0'}">
      <div class="cal-date">${d}</div>
      ${shop?`<div class="cal-shop">${shop}</div>`:'<div class="off-label">放假</div>'}
    </div>`;
  }
  html+=`</div>`;
  el.innerHTML=html;

  // 事件委派：用 onclick 直接綁在容器避免重複
  el.onclick=e=>{
    const day=e.target.closest('[data-clickable="1"]');
    if(day) openOrderPanel(day.dataset.date);
  };
}

function openOrderPanel(date){
  currentDate=date;
  if(!orders[date]) orders[date]={};

  // Switch to order tab
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelector('[data-tab="order"]').classList.add('active');
  document.getElementById('tab-order').classList.add('active');
  renderOrderTab(date);
}

function renderOrderTab(date){
  date=date||currentDate;
  const el=document.getElementById('tab-order');
  const today=todayStr();

  if(!date){
    // Show today or prompt
    if(SCHEDULE[today]){
      currentDate=today;
      date=today;
    } else {
      el.innerHTML=`<div class="empty">請從月曆點選日期開始訂購</div>`;
      return;
    }
  }

  currentDate=date;
  const shop=SCHEDULE[date];
  if(!shop){el.innerHTML=`<div class="empty">此日無便當</div>`;return;}
  if(!orders[date]) orders[date]={};

  const dateParts=date.split('-');
  const dateLabel=`${dateParts[1]}/${dateParts[2]}`;
  const dayNames=['日','一','二','三','四','五','六'];
  const dayName=dayNames[new Date(date).getDay()];

  let html=`<div class="order-header">
    <div>
      <div class="order-shop-name">${shop}</div>
      <div class="order-date-label">${dateLabel}（週${dayName}）</div>
    </div>
    <button class="btn-back" onclick="renderCalendar();document.querySelector('[data-tab=calendar]').click()">← 月曆</button>
  </div>`;

  // Person selector — 固定名單 + 臨時加人
  const extraPeople = extraPeopleByDate[date] || [];
  const allPeople = [...PEOPLE, ...extraPeople];

  html+=`<div class="person-select-bar">
    <div class="person-select-label">選擇人員</div>
    <div class="person-chips" id="person-chips-wrap">`;
  allPeople.forEach(p=>{
    const hasPerson=orders[date][p]&&orders[date][p].length>0;
    const isSel=p===currentPerson;
    const isExtra=extraPeople.includes(p);
    html+=`<button class="person-chip${isSel?' selected':''}" onclick="selectPerson('${escQ(p)}','${date}')">
      ${p}${hasPerson?'✓':''}${isExtra?` <span onclick="event.stopPropagation();removeExtraPerson('${date}','${escQ(p)}')" style="opacity:.6;margin-left:2px">×</span>`:''}
    </button>`;
  });
  // 新增人員 input
  html+=`<div style="display:flex;gap:6px;align-items:center;margin-top:4px;width:100%">
    <input type="text" id="new-person-input" placeholder="臨時加人…" maxlength="20"
      style="border:1px solid var(--line);border-radius:20px;padding:5px 14px;font-size:13px;outline:none;font-family:inherit;background:var(--bg);flex:1;max-width:160px"
      onkeydown="if(event.key==='Enter')addExtraPerson('${date}')">
    <button class="btn-sm" onclick="addExtraPerson('${date}')" style="border-radius:20px;padding:5px 14px;white-space:nowrap">＋ 加入</button>
  </div>`;
  html+=`</div></div>`;

  // Menu + 取消訂購按鈕
  if(!currentPerson){
    html+=`<div class="empty">👆 請先選擇人員，再點選品項</div>`;
  } else {
    const menu=MENUS[shop]||[];
    const personOrders=orders[date][currentPerson]||[];
    const hasAnyOrder=personOrders.length>0;

    // 當前人員操作列
    html+=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px">
      <div style="font-size:14px;font-weight:600;color:var(--ink)">正在為 <span style="color:var(--accent)">${currentPerson}</span> 點餐</div>
      ${hasAnyOrder?`<button onclick="cancelPersonOrder('${date}','${escQ(currentPerson)}')"
        style="background:none;border:1px solid #FCA5A5;border-radius:6px;padding:5px 12px;font-size:12px;color:#EF4444;cursor:pointer;font-family:inherit">
        ✕ 取消 ${currentPerson} 的訂單
      </button>`:''}
    </div>`;

    html+=`<div class="menu-section">`;
    menu.forEach(cat=>{
      html+=`<div class="menu-cat">${cat.cat}</div>`;
      cat.items.forEach(item=>{
        const existing=personOrders.find(o=>o.name===item.name);
        const qty=existing?existing.qty:0;
        html+=`<div class="menu-item">
          <div><div class="menu-item-name">${item.name}</div>${item.sub?`<div class="menu-item-sub">${item.sub}</div>`:''}</div>
          <div class="menu-item-price">$${item.price}</div>
          <div class="menu-item-qty">
            <button class="qty-btn" onclick="changeQty('${date}','${escQ(item.name)}',${item.price},-1)">−</button>
            <span class="qty-num${qty>0?' nonzero':''}" id="qty-${escId(item.name)}">${qty}</span>
            <button class="qty-btn" onclick="changeQty('${date}','${escQ(item.name)}',${item.price},1)">+</button>
          </div>
        </div>`;
      });
    });
    html+=`</div>`;

    // 點餐備註欄
    const orderNote=(orderNotes[date]&&orderNotes[date][currentPerson])||'';
    const safeNote=orderNote.replace(/"/g,'&quot;');
    html+=`<div style="background:#fff;border:1px solid var(--line);border-radius:10px;padding:14px 16px;margin-bottom:4px">
      <div style="font-size:12px;font-weight:600;color:var(--ink3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px">📝 備註給店家</div>
      <input type="text" id="order-note-input" placeholder="例：飯少、蛋過敏、不要辣…" maxlength="50"
        value="${safeNote}"
        data-date="${date}" data-person="${currentPerson.replace(/"/g,'&quot;')}"
        onblur="saveOrderNote(this.dataset.date,this.dataset.person,this.value)"
        style="width:100%;border:1px solid var(--line);border-radius:8px;padding:9px 12px;font-size:14px;font-family:inherit;outline:none;background:var(--bg)"/>
    </div>`;
  }

  // Summary
  html+=renderPersonSummary(date);
  el.innerHTML=html;
}

function saveOrderNote(date,person,note){
  if(!orderNotes[date]) orderNotes[date]={};
  if(note) orderNotes[date][person]=note;
  else delete orderNotes[date][person];
  const safeDate=date.replace(/-/g,'_');
  const safePerson=person.replace(/[.#$[\]]/g,'_');
  db.ref(`orderNotes/${safeDate}/${safePerson}`).set(note||null);
}

function selectPerson(person,date){
  currentPerson=person;
  renderOrderTab(date);
}

function changeQty(date,itemName,price,delta){
  if(!currentPerson) return;
  if(!orders[date]) orders[date]={};
  if(!orders[date][currentPerson]) orders[date][currentPerson]=[];
  const arr=orders[date][currentPerson];
  const idx=arr.findIndex(o=>o.name===itemName);
  if(idx>=0){
    arr[idx].qty+=delta;
    if(arr[idx].qty<=0) arr.splice(idx,1);
  } else if(delta>0){
    arr.push({name:itemName,price,qty:1});
  }
  savePersonOrder(date, currentPerson);
  // Update just the qty display + summary
  const qtyEl=document.getElementById('qty-'+escId(itemName));
  if(qtyEl){
    const cur=arr.find(o=>o.name===itemName);
    const q=cur?cur.qty:0;
    qtyEl.textContent=q;
    qtyEl.className='qty-num'+(q>0?' nonzero':'');
  }
  // Re-render summary
  const summaryEl=document.getElementById('order-summary-area');
  if(summaryEl) summaryEl.innerHTML=renderPersonSummary(date);
  // Update person chip badge
  renderPersonChips(date);
}

function renderPersonChips(date){
  document.querySelectorAll('.person-chip').forEach(chip=>{
    const name=chip.textContent.replace('✓','').trim();
    const has=orders[date]&&orders[date][name]&&orders[date][name].length>0;
    chip.textContent=name+(has?'✓':'');
  });
}

function calcItemStats(allOrders, date){
  const stats={};
  Object.entries(allOrders).filter(([,v])=>Array.isArray(v)&&v.length>0).forEach(([person,items])=>{
    const note=date?(orderNotes[date]&&orderNotes[date][person])||'':'';
    items.forEach(i=>{
      if(!stats[i.name]) stats[i.name]={qty:0,price:i.price,notes:[]};
      stats[i.name].qty+=i.qty;
      if(note) stats[i.name].notes.push(note);
    });
  });
  return stats;
}

function renderPersonSummary(date){
  const allOrders=orders[date]||{};
  const people=Object.keys(allOrders).filter(p=>Array.isArray(allOrders[p])&&allOrders[p].length>0);
  if(!people.length) return `<div id="order-summary-area"></div>`;

  let total=0;
  const stats=calcItemStats(allOrders, date);
  let html=`<div id="order-summary-area"><div class="order-summary">`;

  html+=`<div class="summary-title">📋 品項統計（給店家）</div>`;
  Object.entries(stats).forEach(([name,{qty,price,notes}])=>{
    const amt=price*qty;
    total+=amt;
    // 彙整備註：去重後顯示
    const uniqueNotes=[...new Set(notes)];
    const noteText=uniqueNotes.length?`<div style="font-size:11px;color:var(--accent);margin-top:2px">其中${notes.length}份：${uniqueNotes.join('、')}</div>`:'';
    html+=`<div class="summary-row">
      <div>
        <div class="summary-person" style="font-weight:700">${name}</div>
        ${noteText}
      </div>
      <div style="display:flex;align-items:center;gap:12px">
        <span style="font-size:15px;font-weight:800;color:var(--accent)">×${qty}</span>
        <span class="summary-amount">$${amt}</span>
      </div>
    </div>`;
  });
  html+=`<div class="summary-total">
    <span class="summary-total-label">合計</span>
    <span class="summary-total-amount">$${total}</span>
  </div>`;

  html+=`<div class="summary-title" style="margin-top:16px;padding-top:16px;border-top:1px solid var(--line)">👤 個人明細（收錢用）</div>`;
  people.forEach(p=>{
    const items=allOrders[p];
    const amt=items.reduce((s,i)=>s+i.price*i.qty,0);
    const note=(orderNotes[date]&&orderNotes[date][p])||'';
    html+=`<div class="summary-row">
      <div><div class="summary-person">${p}${note?` <span style="font-size:11px;color:var(--accent);font-weight:600">⚠️${note}</span>`:''}</div>
      <div class="summary-items">${items.map(i=>i.name+(i.qty>1?` ×${i.qty}`:'')).join('、')}</div></div>
      <div class="summary-amount">$${amt}</div>
    </div>`;
  });

  html+=`<div class="action-row">
    <button class="btn-primary" onclick="copyOrderSummary('${date}')">複製訂單摘要</button>
    <button class="btn-outline" onclick="clearDateOrders('${date}')">清空今日訂單</button>
  </div></div></div>`;
  return html;
}

function copyOrderSummary(date){
  const shop=SCHEDULE[date]||'';
  const d=date.split('-');
  const allOrders=orders[date]||{};
  const stats=calcItemStats(allOrders);
  let total=0;
  let text=`📦 ${d[1]}/${d[2]} ${shop}\n${'─'.repeat(25)}\n`;
  text+=`【品項統計】\n`;
  Object.entries(stats).forEach(([name,{qty,price}])=>{
    const amt=price*qty;
    total+=amt;
    text+=`${name} ×${qty}　$${amt}\n`;
  });
  text+=`合計：$${total}\n`;
  text+=`${'─'.repeat(25)}\n【個人明細】\n`;
  Object.entries(allOrders).filter(([,v])=>Array.isArray(v)&&v.length>0).forEach(([p,items])=>{
    const amt=items.reduce((s,i)=>s+i.price*i.qty,0);
    const note=(orderNotes[date]&&orderNotes[date][p])||'';
    text+=`${p}　$${amt}${note?' ⚠️'+note:''}\n`;
  });
  navigator.clipboard.writeText(text).then(()=>showToast('已複製訂單摘要')).catch(()=>showToast('複製失敗，請手動複製'));
}

    // 個人明細

      personRows+=`<div class="summary-row">
        <div><div class="summary-person">${p}${note?` <span style="font-size:11px;color:var(--accent);font-weight:600">⚠️${note}</span>`:''}</div>

        <button class="btn-outline" onclick="openOrderPanel('${date}')">編輯</button>

// ══════════════════════════════════════════════════
// paid: { date: { person: true/false } }  ← 現在由 Firebase 管，不用再宣告
let paymentDate = null;

function renderPaymentTab(){
  const el=document.getElementById('tab-payment');
  const datesWithOrders=Object.keys(orders)
    .filter(d=>Object.entries(orders[d]).some(([,v])=>Array.isArray(v)&&v.length>0)).sort();

  if(!datesWithOrders.length){
    el.innerHTML=`<div class="empty">還沒有任何訂單，請先到「今日訂購」填寫訂單</div>`;return;
  }

  // Default to today if available, else latest
  if(!paymentDate||!datesWithOrders.includes(paymentDate)){
    const today=todayStr();
    paymentDate=datesWithOrders.includes(today)?today:datesWithOrders[datesWithOrders.length-1];
  }

  let html=`<div class="payment-date-selector">
    <div class="payment-date-label">選擇日期</div>
    <div class="date-chips">`;
  datesWithOrders.forEach(d=>{
    const dp=d.split('-');
    html+=`<button class="date-chip${d===paymentDate?' selected':''}" onclick="selectPaymentDate('${d}')">${dp[1]}/${dp[2]}</button>`;
  });
  html+=`</div></div>`;

  html+=renderPaymentBody(paymentDate);
  el.innerHTML=html;
}

function selectPaymentDate(date){
  paymentDate=date;
  renderPaymentTab();
}

function renderPaymentBody(date){
  const allOrders=orders[date]||{};
  const people=Object.entries(allOrders).filter(([,v])=>Array.isArray(v)&&v.length>0);
  if(!people.length) return `<div class="empty">此日無訂單</div>`;

  if(!paid[date]) paid[date]={};
  const shop=SCHEDULE[date]||'';
  const dp=date.split('-');

  let totalAmt=0, paidAmt=0, unpaidCount=0;
  people.forEach(([p,items])=>{
    const amt=items.reduce((s,i)=>s+i.price*i.qty,0);
    totalAmt+=amt;
    if(paid[date][p]) paidAmt+=amt; else unpaidCount++;
  });
  const unpaidAmt=totalAmt-paidAmt;

  let html=`<div style="font-size:13px;color:var(--ink3);margin-bottom:12px">${dp[1]}/${dp[2]} ｜ ${shop}</div>`;

  // 金額統計
  html+=`<div class="payment-stats">
    <div class="payment-stat">
      <div class="payment-stat-label">應收總計</div>
      <div class="payment-stat-value blue">$${totalAmt}</div>
    </div>
    <div class="payment-stat">
      <div class="payment-stat-label">已收</div>
      <div class="payment-stat-value green">$${paidAmt}</div>
    </div>
    <div class="payment-stat">
      <div class="payment-stat-label">未收</div>
      <div class="payment-stat-value orange">$${unpaidAmt}</div>
    </div>
  </div>`;

  // 品項統計
  const stats=calcItemStats(allOrders, date);
  html+=`<div class="order-summary" style="margin-bottom:16px">
    <div class="summary-title">📋 品項統計</div>`;
  Object.entries(stats).forEach(([name,{qty,price,notes}])=>{
    const amt=price*qty;
    const uniqueNotes=[...new Set(notes)];
    const noteText=uniqueNotes.length?`<div style="font-size:11px;color:var(--accent);margin-top:2px">其中${notes.length}份：${uniqueNotes.join('、')}</div>`:'';
    html+=`<div class="summary-row">
      <div>
        <div class="summary-person" style="font-weight:700">${name}</div>
        ${noteText}
      </div>
      <div style="display:flex;align-items:center;gap:12px">
        <span style="font-size:14px;font-weight:800;color:var(--accent)">×${qty}</span>
        <span class="summary-amount">$${amt}</span>
      </div>
    </div>`;
  });
  html+=`</div>`;

  // List
  html+=`<div class="payment-list">
    <div class="payment-list-header">
      <span>姓名</span><span>品項</span><span style="text-align:right">金額</span><span style="text-align:center">已付</span>
    </div>`;

  people.forEach(([p,items])=>{
    const amt=items.reduce((s,i)=>s+i.price*i.qty,0);
    const isPaid=!!paid[date][p];
    const note=(paid[date]&&paid[date][p+'_note'])||'';
    html+=`<div class="payment-row${isPaid?' paid-row':''}" id="prow-${escId(p)}">
      <div class="payment-name">${p}</div>
      <div class="payment-items">${items.map(i=>i.name+(i.qty>1?` ×${i.qty}`:'')).join('<br>')}</div>
      <div class="payment-amount">$${amt}</div>
      <div class="pay-toggle">
        <button onclick="togglePaid('${date}','${escQ(p)}')"
          style="width:32px;height:32px;border-radius:8px;border:2px solid ${isPaid?'#15803D':'#D4D0C8'};
          background:${isPaid?'#15803D':'#fff'};cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0">
          ${isPaid?`<svg width="13" height="10" viewBox="0 0 13 10" fill="none"><path d="M1.5 5L5 8.5L11.5 1.5" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>`:''}
        </button>
      </div>
    </div>
    <div style="padding:4px 16px 10px;border-top:none">
      <input type="text" placeholder="備註（找錢、欠款等）" value="${escQ(note)}"
        onchange="saveNote('${date}','${escQ(p)}',this.value)"
        style="width:100%;border:1px solid #E8E6E1;border-radius:6px;padding:6px 10px;font-size:12px;color:#666;background:#FAFAF8;font-family:inherit;outline:none" value="${escQ(note)}">
    </div>`;
  });
  html+=`</div>`;

  // Unpaid list
  const unpaidPeople=people.filter(([p])=>!paid[date][p]);
  if(unpaidPeople.length){
    html+=`<div class="unpaid-banner">
      <div class="unpaid-banner-title">⚠️ 尚未付款（${unpaidPeople.length} 人）</div>
      <div class="unpaid-chips-wrap">
        ${unpaidPeople.map(([p,items])=>{
          const amt=items.reduce((s,i)=>s+i.price*i.qty,0);
          return `<span class="unpaid-chip">${p} $${amt}</span>`;
        }).join('')}
      </div>
    </div>`;
  } else {
    html+=`<div style="margin-top:14px;padding:12px 16px;background:var(--green-bg);border:1px solid #BBF7D0;border-radius:10px;font-size:14px;color:var(--green);font-weight:600;text-align:center">✅ 今日已全部收款完畢！</div>`;
  }

  // Copy button
  html+=`<div class="action-row" style="margin-top:16px">
    <button class="btn-primary" onclick="copyPaymentSummary('${date}')">複製收款摘要</button>
    <button class="btn-outline" onclick="resetPayment('${date}')">清空付款記錄</button>
  </div>`;

  return html;
}

function togglePaid(date,person){
  if(!paid[date]) paid[date]={};
  paid[date][person]=!paid[date][person];
  savePaid();
  const el=document.getElementById('tab-payment');
  const bodyHtml=renderPaymentBody(date);
  const selector=el.querySelector('.payment-date-selector');
  el.innerHTML='';
  el.appendChild(selector);
  const bodyDiv=document.createElement('div');
  bodyDiv.innerHTML=bodyHtml;
  while(bodyDiv.firstChild) el.appendChild(bodyDiv.firstChild);
}

function saveNote(date,person,note){
  if(!paid[date]) paid[date]={};
  if(note) paid[date][person+'_note']=note;
  else delete paid[date][person+'_note'];
  savePaid();
}

function resetPayment(date){
  adminCheck(()=>{
    if(!confirm('確定清空 '+date.split('-').slice(1).join('/')+ ' 的付款記錄？')) return;
    delete paid[date];
    savePaid();
    renderPaymentTab();
  });
}

function copyPaymentSummary(date){
  const allOrders=orders[date]||{};
  const people=Object.entries(allOrders).filter(([,v])=>Array.isArray(v)&&v.length>0);
  people.forEach(([p,items])=>{
    const amt=items.reduce((s,i)=>s+i.price*i.qty,0);
    totalAmt+=amt;
    const isPaid=paid[date]&&paid[date][p];
    if(isPaid) paidAmt+=amt;
    text+=`${isPaid?'✅':'❌'} ${p}　${items.map(i=>i.name+(i.qty>1?` ×${i.qty}`:'')).join('、')}　$${amt}\n`;
  });
  text+=`${'─'.repeat(25)}\n合計：$${totalAmt}　已收：$${paidAmt}　未收：$${totalAmt-paidAmt}`;
  const unpaid=people.filter(([p])=>!paid[date]||!paid[date][p]);
  if(unpaid.length) text+=`\n\n⚠️ 未付：${unpaid.map(([p])=>p).join('、')}`;
  navigator.clipboard.writeText(text).then(()=>showToast('已複製收款摘要')).catch(()=>showToast('複製失敗'));
}

// ══════════════════════════════════════════════════
// Utils
// ══════════════════════════════════════════════════
function escQ(s){return s.replace(/'/g,"\\'");}
function escId(s){return s.replace(/[^a-zA-Z0-9\u4e00-\u9fff]/g,'_');}
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

// ══════════════════════════════════════════════════
// Init
// ══════════════════════════════════════════════════
initFirebase();
renderCalendar();
</script>
