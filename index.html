<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#23281f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="午餐訂便當">
<meta name="mobile-web-app-capable" content="yes">
<title>2026年8月午餐訂購</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@600;700;900&family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#23281f;
  --ink-soft:#3a4232;
  --paper:#f2efe4;
  --paper-2:#e9e4d3;
  --card:#fffdf6;
  --accent:#d6a419;
  --accent-deep:#a9800f;
  --chili:#a13d2c;
  --line:#d8d2bf;
  --muted:#7a7563;
  --radius:14px;
  --shadow: 0 2px 0 rgba(35,40,31,0.06), 0 10px 24px -14px rgba(35,40,31,0.35);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--paper);
  background-image:
    radial-gradient(circle at 1px 1px, rgba(35,40,31,0.06) 1px, transparent 0);
  background-size: 22px 22px;
  color:var(--ink);
  font-family:'Noto Sans TC','PingFang TC','Microsoft JhengHei',sans-serif;
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
}
a{color:inherit;}
.wrap{max-width:1040px;margin:0 auto;padding:28px 20px 120px;}

/* ---------- header ---------- */
header.top{
  display:flex;justify-content:space-between;align-items:flex-end;gap:16px;
  border-bottom:3px solid var(--ink);
  padding-bottom:18px;margin-bottom:26px;flex-wrap:wrap;
}
.eyebrow{
  font-size:12px;letter-spacing:.28em;text-transform:uppercase;color:var(--accent-deep);
  font-weight:700;margin-bottom:6px;
}
h1{
  font-family:'Noto Serif TC',serif;font-weight:900;
  font-size:clamp(28px,4.4vw,42px);margin:0;line-height:1.15;letter-spacing:.02em;
}
h1 .accent{color:var(--chili);}
.top-right{text-align:right;font-size:13px;color:var(--muted);line-height:1.6;}
.top-right b{color:var(--ink);}

/* ---------- name field ---------- */
.namebar{
  display:flex;align-items:center;gap:12px;background:var(--card);
  border:1.5px solid var(--ink);border-radius:var(--radius);
  padding:12px 16px;margin-bottom:22px;box-shadow:var(--shadow);
  flex-wrap:wrap;
}
.namebar label{font-weight:700;font-size:14px;white-space:nowrap;}
.namebar input{
  flex:1;min-width:140px;border:none;border-bottom:2px solid var(--line);
  background:transparent;font-size:16px;font-family:inherit;padding:6px 4px;
  color:var(--ink);outline:none;
}
.namebar input:focus{border-bottom-color:var(--accent);}

/* ---------- calendar strip (ticket tabs) ---------- */
.cal-label{font-weight:700;font-size:14px;margin:0 0 10px 2px;color:var(--ink-soft);}
.calendar{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(96px,1fr));
  gap:10px;margin-bottom:30px;
}
.day-chip{
  position:relative;
  background:var(--card);
  border:1.5px solid var(--ink);
  border-radius:10px;
  padding:10px 8px 12px;
  cursor:pointer;
  text-align:center;
  transition:transform .12s ease, box-shadow .12s ease;
  box-shadow:2px 2px 0 var(--ink);
}
.day-chip:hover{transform:translate(-1px,-1px);box-shadow:3px 3px 0 var(--ink);}
.day-chip:before,.day-chip:after{
  content:"";position:absolute;top:50%;width:10px;height:10px;
  background:var(--paper);border:1.5px solid var(--ink);border-radius:50%;
  transform:translateY(-50%);
}
.day-chip:before{left:-6px;}
.day-chip:after{right:-6px;}
.day-chip .dow{font-size:11px;color:var(--muted);font-weight:600;letter-spacing:.05em;}
.day-chip .dnum{font-family:'Noto Serif TC',serif;font-weight:900;font-size:22px;line-height:1.3;}
.day-chip .store{
  font-size:11px;font-weight:600;color:var(--ink-soft);
  overflow:hidden;text-overflow:ellipsis;display:-webkit-box;
  -webkit-line-clamp:2;-webkit-box-orient:vertical;min-height:2.6em;
}
.day-chip.selected{
  background:var(--ink);color:var(--paper);border-color:var(--ink);
  box-shadow:2px 2px 0 var(--accent);
}
.day-chip.selected .dow,.day-chip.selected .store{color:#cfd6c2;}
.day-chip.selected .dnum{color:var(--accent);}
.day-chip.today .dnum{position:relative;}
.day-chip.today .dnum:after{
  content:"";position:absolute;left:50%;bottom:-4px;transform:translateX(-50%);
  width:6px;height:6px;border-radius:50%;background:var(--chili);
}

/* ---------- store card ---------- */
.store-card{
  background:var(--card);border:1.5px solid var(--ink);border-radius:var(--radius);
  padding:20px 22px;margin-bottom:22px;box-shadow:var(--shadow);
}
.store-card h2{
  font-family:'Noto Serif TC',serif;font-size:24px;margin:0 0 4px;
  display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;
}
.store-card h2 .tag{
  font-size:11px;background:var(--accent);color:var(--ink);
  padding:3px 9px;border-radius:999px;font-weight:700;letter-spacing:.05em;
}
.store-meta{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:6px 22px;margin-top:12px;font-size:13.5px;color:var(--ink-soft);
}
.store-meta div span.k{color:var(--muted);margin-right:6px;}
.store-note{
  margin-top:12px;padding-top:12px;border-top:1px dashed var(--line);
  font-size:13px;color:var(--chili);font-weight:500;
}

/* ---------- menu ---------- */
.menu-section h3{
  font-family:'Noto Serif TC',serif;font-size:17px;margin:26px 0 10px;
  padding-left:12px;border-left:5px solid var(--accent);
}
.menu-grid{display:flex;flex-direction:column;gap:8px;}
.item-row{
  display:flex;align-items:center;justify-content:space-between;gap:14px;
  background:var(--card);border:1px solid var(--line);border-radius:10px;
  padding:12px 14px;
}
.item-row.active{border-color:var(--accent);box-shadow:0 0 0 2px rgba(214,164,25,0.25) inset;}
.item-info{flex:1;min-width:0;}
.item-name{font-weight:600;font-size:14.5px;}
.item-price{font-size:12.5px;color:var(--muted);margin-top:2px;}
.stepper{display:flex;align-items:center;gap:0;flex-shrink:0;touch-action:manipulation;}
.stepper button{
  width:40px;height:40px;border:1.5px solid var(--ink);background:var(--paper);
  font-size:19px;font-weight:700;cursor:pointer;color:var(--ink);
  display:flex;align-items:center;justify-content:center;
  transition:background .1s;touch-action:manipulation;
  -webkit-tap-highlight-color:transparent;
}
.stepper button:hover{background:var(--accent);}
.stepper button:active{background:var(--accent);}
.stepper button:first-child{border-radius:8px 0 0 8px;}
.stepper button:last-child{border-radius:0 8px 8px 0;}
.stepper .qty{
  width:38px;text-align:center;font-weight:700;font-size:15px;
  border-top:1.5px solid var(--ink);border-bottom:1.5px solid var(--ink);
  height:40px;line-height:40px;background:var(--card);
}

/* ---------- cart / summary ---------- */
.cart-bar{
  position:sticky;bottom:0;left:0;right:0;
  margin-top:30px;
  background:var(--ink);color:var(--paper);
  border-radius:var(--radius) var(--radius) 0 0;
  box-shadow:0 -8px 24px rgba(0,0,0,.25);
}
.cart-summary{
  display:flex;align-items:center;justify-content:space-between;gap:16px;
  padding:16px 22px;flex-wrap:wrap;
}
.cart-summary .count{font-size:13px;color:#c9cdb9;}
.cart-summary .total{font-family:'Noto Serif TC',serif;font-size:24px;font-weight:900;color:var(--accent);}
.cart-summary .total small{font-size:13px;color:#c9cdb9;font-weight:500;}
.cart-actions{display:flex;gap:10px;}
.btn{
  border:none;border-radius:999px;padding:11px 22px;font-weight:700;font-size:14px;
  cursor:pointer;font-family:inherit;transition:transform .1s;
}
.btn:active{transform:scale(.97);}
.btn-primary{background:var(--accent);color:var(--ink);}
.btn-primary:hover{background:#e6b52a;}
.btn-ghost{background:transparent;color:var(--paper);border:1.5px solid #565f4b;}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent);}
.cart-detail{
  max-height:0;overflow:hidden;transition:max-height .25s ease;
  border-top:1px solid #3a4232;
}
.cart-detail.open{max-height:340px;overflow-y:auto;}
.cart-detail ul{list-style:none;margin:0;padding:14px 22px;display:flex;flex-direction:column;gap:8px;}
.cart-detail li{display:flex;justify-content:space-between;font-size:13.5px;gap:10px;}
.cart-detail li .n{color:#e6e3d4;}
.cart-detail li .p{color:var(--accent);font-weight:700;white-space:nowrap;}

.empty-note{
  text-align:center;padding:60px 20px;color:var(--muted);font-size:14px;
}

/* ---------- order modal ---------- */
.modal-backdrop{
  position:fixed;inset:0;background:rgba(35,40,31,.55);
  display:none;align-items:center;justify-content:center;padding:20px;z-index:50;
}
.modal-backdrop.open{display:flex;}
.modal{
  background:var(--card);border-radius:var(--radius);max-width:480px;width:100%;
  padding:24px;box-shadow:var(--shadow);max-height:86vh;display:flex;flex-direction:column;
}
.modal h3{font-family:'Noto Serif TC',serif;margin:0 0 12px;font-size:20px;}
.modal textarea{
  flex:1;min-height:260px;border:1.5px solid var(--line);border-radius:10px;
  padding:12px;font-family:'Noto Sans TC',monospace;font-size:13px;line-height:1.7;
  resize:vertical;background:var(--paper);color:var(--ink);
}
.modal-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:14px;}
.copied-note{font-size:12.5px;color:var(--chili);margin-top:8px;min-height:1.2em;font-weight:600;}

footer.foot{text-align:center;color:var(--muted);font-size:12px;margin-top:50px;line-height:1.8;}

@media (max-width:560px){
  .top-right{text-align:left;}
  .cart-summary{padding:14px 16px;}
  .wrap{padding:18px 14px 130px;}
  h1{font-size:26px;}
  .calendar{grid-template-columns:repeat(3,1fr);gap:8px;}
  .day-chip{padding:9px 6px 10px;}
  .day-chip:before,.day-chip:after{display:none;}
  .store-card{padding:16px 16px;}
  .item-row{padding:11px 12px;}
  .btn{padding:12px 18px;}
  .modal{padding:18px;max-height:92vh;}
}


/* ---------- tabs + lock ---------- */
.tabs{display:flex;align-items:center;gap:6px;margin:0 0 24px;border-bottom:2px solid var(--line);}
.tab-btn{appearance:none;background:none;border:none;font-family:inherit;font-size:15px;font-weight:700;
  color:var(--muted);padding:11px 15px;cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;transition:color .12s;}
.tab-btn:hover{color:var(--ink-soft);}
.tab-btn.active{color:var(--ink);border-bottom-color:var(--accent);}
.lock-btn{margin-left:auto;appearance:none;background:none;border:none;font-size:18px;cursor:pointer;padding:8px;line-height:1;opacity:.7;align-self:center;}
.lock-btn.on{opacity:1;}
.view{display:none;}
.view.active{display:block;}
.day-chip.has-orders .dnum:before{content:"";position:absolute;top:-4px;right:-4px;width:7px;height:7px;border-radius:50%;background:#2e7d32;}
.day-chip .dnum{position:relative;}

/* ---------- order note (in cart bar) ---------- */
.order-note-wrap{padding:0 22px 12px;}
.order-note-wrap input{width:100%;box-sizing:border-box;background:rgba(255,255,255,.12);
  border:1px solid rgba(255,255,255,.28);color:#fff;border-radius:8px;padding:9px 12px;font-size:13px;font-family:inherit;outline:none;}
.order-note-wrap input::placeholder{color:rgba(255,255,255,.55);}

/* ---------- admin bar / proxy ---------- */
.admin-bar{display:flex;align-items:center;gap:12px;flex-wrap:wrap;background:#fbf3e4;border:1px solid #e6c48f;
  border-radius:10px;padding:10px 14px;margin-bottom:18px;}
.admin-hint{font-size:12px;color:var(--muted);}
.btn-mini{appearance:none;border:1.5px solid var(--ink);background:var(--card);color:var(--ink);border-radius:8px;
  padding:6px 12px;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;box-shadow:1.5px 1.5px 0 var(--ink);}
.btn-mini:active{transform:translate(1px,1px);box-shadow:none;}
.proxy-banner{background:#eaf1fb;border:1px solid #a9c4ec;border-radius:10px;padding:11px 14px;margin-bottom:16px;
  font-size:13px;font-weight:600;color:#2c4a7a;line-height:1.7;}
.proxy-banner .btn-mini{border-color:#2c4a7a;color:#2c4a7a;box-shadow:1.5px 1.5px 0 #2c4a7a;margin-left:4px;}

/* ---------- summary / payment panels ---------- */
.date-chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px;}
.date-chip{background:var(--card);border:1.5px solid var(--ink);border-radius:999px;padding:7px 15px;
  font-weight:700;font-size:13px;cursor:pointer;color:var(--ink);box-shadow:1.5px 1.5px 0 var(--ink);transition:transform .1s;}
.date-chip:active{transform:translate(1px,1px);box-shadow:none;}
.date-chip.selected{background:var(--ink);color:var(--paper);box-shadow:1.5px 1.5px 0 var(--accent);}
.panel{background:var(--card);border:1.5px solid var(--ink);border-radius:var(--radius);
  padding:20px 22px;margin-bottom:20px;box-shadow:var(--shadow);}
.panel-title{font-family:'Noto Serif TC',serif;font-size:22px;margin:0 0 4px;}
.panel-sub{font-size:12px;font-weight:800;letter-spacing:.06em;color:var(--accent-deep);
  margin:20px 0 6px;padding-left:10px;border-left:4px solid var(--accent);}
.srow{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:10px 0;border-bottom:1px dashed var(--line);}
.srow:last-child{border-bottom:none;}
.srow .nm{font-weight:600;font-size:14.5px;}
.srow .sub{font-size:12px;color:var(--muted);margin-top:3px;line-height:1.5;}
.srow .qty-badge{font-weight:800;color:var(--accent-deep);font-size:15px;white-space:nowrap;}
.srow .amt{font-weight:800;color:var(--ink);white-space:nowrap;}
.del-person{appearance:none;background:none;border:none;font-size:16px;cursor:pointer;padding:2px 6px;margin-left:6px;opacity:.65;}
.del-person:active{opacity:1;}
.grand{display:flex;justify-content:space-between;align-items:center;margin-top:14px;padding-top:14px;
  border-top:2px solid var(--ink);font-weight:900;font-size:15px;}
.grand .amt{font-family:'Noto Serif TC',serif;font-size:24px;color:var(--chili);}
.clear-day-btn{margin-top:14px;width:100%;box-sizing:border-box;appearance:none;border:1.5px solid var(--chili);
  background:#fff;color:var(--chili);border-radius:10px;padding:11px;font-weight:800;font-family:inherit;cursor:pointer;}
.clear-day-btn:active{background:#fff2ea;}

/* payment */
.pay-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:6px 0 18px;}
.pay-stat{background:var(--paper-2);border-radius:10px;padding:12px 8px;text-align:center;}
.pay-stat .lab{font-size:11px;color:var(--muted);font-weight:700;}
.pay-stat .val{font-family:'Noto Serif TC',serif;font-weight:900;font-size:20px;margin-top:3px;}
.pay-stat .val.blue{color:var(--ink);}
.pay-stat .val.green{color:#2e7d32;}
.pay-stat .val.orange{color:var(--chili);}
.pay-row{display:flex;align-items:flex-start;gap:12px;padding:12px 0;border-bottom:1px solid var(--line);}
.pay-row.paid .pname,.pay-row.paid .pamt{color:var(--muted);text-decoration:line-through;}
.pay-check{width:34px;height:34px;border-radius:9px;border:2px solid var(--line);background:#fff;
  cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-weight:900;color:#fff;font-size:16px;margin-top:2px;}
.pay-check.on{background:#2e7d32;border-color:#2e7d32;}
.pinfo{flex:1;min-width:0;}
.pname{font-weight:700;font-size:14.5px;}
.pitems{font-size:12px;color:var(--muted);margin-top:2px;line-height:1.5;}
.pamt{font-weight:800;white-space:nowrap;margin-top:2px;}
.unpaid-box{margin-top:16px;background:#fbf1e2;border:1px solid #e6c48f;border-radius:10px;padding:12px 14px;}
.unpaid-box .t{font-size:12px;font-weight:800;color:var(--chili);margin-bottom:8px;}
.unpaid-chip{display:inline-block;background:#fff;border:1px solid #e6c48f;border-radius:999px;padding:4px 11px;font-size:12px;margin:0 6px 6px 0;font-weight:600;}
.allpaid{margin-top:14px;padding:13px;background:#eaf4ea;border:1px solid #bcdcbc;border-radius:10px;
  text-align:center;font-weight:700;color:#2e7d32;}

/* password overlay */
.pw-overlay{position:fixed;inset:0;background:rgba(20,15,10,.55);display:none;align-items:center;justify-content:center;z-index:500;padding:24px;}
.pw-overlay.show{display:flex;}
.pw-box{background:var(--paper);border:1.5px solid var(--ink);border-radius:16px;padding:24px 22px;width:100%;max-width:340px;box-shadow:var(--shadow);}
.pw-title{font-family:'Noto Serif TC',serif;font-size:20px;margin-bottom:14px;}
.pw-box input{width:100%;box-sizing:border-box;border:1.5px solid var(--line);border-radius:9px;padding:11px 13px;font-size:15px;font-family:inherit;outline:none;background:var(--card);color:var(--ink);}
.pw-box input:focus{border-color:var(--accent);}
.pw-err{color:var(--chili);font-size:13px;font-weight:600;min-height:18px;margin-top:8px;}
.pw-actions{display:flex;gap:10px;margin-top:10px;}
.pw-actions button{flex:1;padding:11px;border-radius:9px;font-weight:800;font-family:inherit;font-size:14px;cursor:pointer;}
#pw-cancel{background:var(--card);border:1.5px solid var(--ink);color:var(--ink);}
#pw-ok{background:var(--accent);border:1.5px solid var(--ink);color:var(--ink);}

/* toast + loading */
#loading-bar{position:fixed;top:0;left:0;width:100%;height:3px;background:var(--accent);z-index:999;opacity:0;transition:opacity .3s;}
#toast{position:fixed;left:50%;bottom:100px;transform:translateX(-50%) translateY(16px);
  background:var(--ink);color:var(--paper);padding:11px 20px;border-radius:999px;font-size:14px;font-weight:600;
  opacity:0;pointer-events:none;transition:all .25s;z-index:600;box-shadow:0 8px 24px rgba(0,0,0,.3);max-width:90vw;text-align:center;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

</style>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
</head>
<body>
<div class="wrap">

  <header class="top">
    <div>
      <div class="eyebrow">Lunch Box Order</div>
      <h1>午餐訂便當<span class="accent">．</span>2026年8月</h1>
    </div>
    <div class="top-right">
      每日 <b>09:30</b> 截單，逾時不候<br>
      請於菜單內填寫欲訂購數量
    </div>
  </header>

  <div class="namebar">
    <label for="orderer-name">訂購人姓名</label>
    <input id="orderer-name" type="text" placeholder="請輸入您的姓名（送出訂單時會用到）">
  </div>

  <div class="tabs">
    <button class="tab-btn active" data-tab="order">訂購</button>
    <button class="tab-btn" data-tab="summary">訂單總表</button>
    <button class="tab-btn" data-tab="payment">收款</button>
    <button class="lock-btn" id="lock-btn" title="管理模式">🔒</button>
  </div>

  <div class="view active" id="view-order">
  <div class="admin-bar" id="admin-bar" style="display:none">
    <button class="btn-mini" id="proxy-btn">＋ 代人訂購</button>
    <span class="admin-hint">管理模式：可代訂、可在「訂單總表」刪單／清整天</span>
  </div>
  <div class="proxy-banner" id="proxy-banner" style="display:none"></div>
  <div class="cal-label">選擇日期</div>
  <div class="calendar" id="calendar"></div>

  <div id="content"></div>
  </div>

  <div class="view" id="view-summary"></div>
  <div class="view" id="view-payment"></div>

</div>

<div class="cart-bar" id="cart-bar" style="display:none;">
  <div class="cart-summary" id="cart-toggle">
    <div>
      <div class="count" id="cart-count">尚未選購品項</div>
      <div class="total">$<span id="cart-total">0</span> <small>合計</small></div>
    </div>
    <div class="cart-actions">
      <button class="btn btn-ghost" id="clear-btn">清空</button>
      <button class="btn btn-primary" id="submit-btn">送出訂單</button>

  function personTotal(items){ return items.reduce(function(s,i){ return s+i.price*i.qty; },0); }
  function datesWithOrders(){ return Object.keys(orders).filter(function(d){ var o=orders[d]||{}; return Object.keys(o).some(function(k){ return Array.isArray(o[k])&&o[k].length>0; }); }).sort(); }

  var toastTimer=null;
  function toast(msg){ var t=$('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(toastTimer); toastTimer=setTimeout(function(){ t.classList.remove('show'); },2400); }
  function showLoading(on){ var el=$('loading-bar'); if(el) el.style.opacity=on?'1':'0'; }

  // ---------------- Firebase ----------------
  function initFirebase(){
    showLoading(true);
    db.ref('orders').on('value', function(snap){
      var raw=snap.val()||{}; orders={};
      Object.keys(raw).forEach(function(sd){ var date=sd.replace(/_/g,'-'); orders[date]={}; var ps=raw[sd]||{};
        Object.keys(ps).forEach(function(sp){ var it=ps[sp]; orders[date][sp]=Array.isArray(it)?it:(it&&typeof it==='object'?Object.values(it):[]); }); });
      refreshCalendarBadges();
      if(state.tab==='summary') renderSummary();
      if(state.tab==='payment') renderPayment();
      maybeAutofill();
    });
    db.ref('orderNotes').on('value', function(snap){
      var raw=snap.val()||{}; notes={};
      Object.keys(raw).forEach(function(sd){ var date=sd.replace(/_/g,'-'); notes[date]={}; var ps=raw[sd]||{};
        Object.keys(ps).forEach(function(sp){ notes[date][sp]=ps[sp]; }); });
      if(state.tab==='summary') renderSummary();
    });
    db.ref('paid').on('value', function(snap){ paid=snap.val()||{}; if(state.tab==='payment') renderPayment(); });
    db.ref('.info/connected').on('value', function(snap){ var c=snap.val(); showLoading(!c); if(c&&!state.greeted){ state.greeted=true; toast('\u2705 \u5df2\u9023\u7dda\u96f2\u7aef'); } });
  }

  // ---------------- cart <-> cloud ----------------
  function cartKeyPrefix(){ return state.selectedDate+'|'+CAL[state.selectedDate]+'|'; }
  function hasLocalCartForDate(date){ var pre=date+'|'+CAL[date]+'|'; return Object.keys(state.cart).some(function(k){ return k.indexOf(pre)===0; }); }
  function clearCartForDate(date){ var pre=date+'|'+CAL[date]+'|'; Object.keys(state.cart).forEach(function(k){ if(k.indexOf(pre)===0) delete state.cart[k]; }); }

  function loadMyOrder(){
    var date=state.selectedDate, name=currentName();
    clearCartForDate(date);
    var noteEl=$('order-note'); if(noteEl) noteEl.value='';
    if(!name||!date||!CAL[date]) return;
    var key=safePersonKey(name);
    var stored=orderArr(date,key); var menu=MENUS[CAL[date]]||[]; var used={};
    stored.forEach(function(si){ for(var idx=0; idx<menu.length; idx++){ if(used[idx]) continue;
      if(menu[idx].n===si.name && menu[idx].p===si.price){ used[idx]=true;
        state.cart[date+'|'+CAL[date]+'|'+idx]={date:date,store:CAL[date],name:si.name,category:menu[idx].c,price:si.price,qty:si.qty}; return; } } });
    if(noteEl && notes[date] && notes[date][key]) noteEl.value=notes[date][key];
  }
  function maybeAutofill(){
    if(state.tab!=='order') return;
    var date=state.selectedDate, name=currentName();
    if(!date||!name||!CAL[date]) return;
    if(hasLocalCartForDate(date)) return;
    if(!orderArr(date,safePersonKey(name)).length) return;
    loadMyOrder(); renderContent(); renderCart();
  }

  // ---------------- calendar ----------------
  function buildCalendar(){
    var el=$('calendar'); var dates=Object.keys(CAL).sort(); var today=todayISO();
    var initial=dates.indexOf(today)!==-1?today:dates[0];
    dates.forEach(function(iso){ var info=fmtDateLabel(iso); var chip=document.createElement('div');
      chip.className='day-chip'+(iso===today?' today':''); chip.dataset.date=iso;
      chip.innerHTML='<div class="dow">\u9031'+info.dow+'</div><div class="dnum">'+info.day+'</div><div class="store">'+esc(CAL[iso])+'</div>';
      chip.addEventListener('click', function(){ selectDate(iso); }); el.appendChild(chip); });
    selectDate(initial);
  }
  function refreshCalendarBadges(){ document.querySelectorAll('.day-chip').forEach(function(chip){ var d=chip.dataset.date; var o=orders[d]||{};
    var has=Object.keys(o).some(function(k){ return Array.isArray(o[k])&&o[k].length>0; }); chip.classList.toggle('has-orders', !!has); }); }
  function selectDate(iso){ state.selectedDate=iso;
    document.querySelectorAll('.day-chip').forEach(function(c){ c.classList.toggle('selected', c.dataset.date===iso); });
    loadMyOrder(); renderContent(); renderCart(); }

  // ---------------- ordering view ----------------
  function getQty(idx){ var k=cartKeyPrefix()+idx; return state.cart[k]?state.cart[k].qty:0; }
  function setQty(idx,item,qty){ var k=cartKeyPrefix()+idx; if(qty<=0){ delete state.cart[k]; }
    else { state.cart[k]={date:state.selectedDate,store:CAL[state.selectedDate],name:item.n,category:item.c,price:item.p,qty:qty}; } }
  function renderContent(){
    var el=$('content'); el.innerHTML=''; var iso=state.selectedDate; var storeName=CAL[iso];
    if(!storeName){ el.innerHTML='<div class="empty-note">\u9019\u5929\u6c92\u6709\u8a02\u8cfc\u5594\uff0c\u8acb\u9078\u64c7\u5176\u4ed6\u65e5\u671f\u3002</div>'; return; }
    var store=STORES[storeName]||{}; var items=MENUS[storeName]||[]; var info=fmtDateLabel(iso);
    var card=document.createElement('div'); card.className='store-card'; var m='';
    if(store.phone)     m+='<div><span class="k">\u96fb\u8a71</span>'+esc(store.phone)+'</div>';
    if(store.mobile)    m+='<div><span class="k">\u624b\u6a5f</span>'+esc(store.mobile)+'</div>';
    if(store.address)   m+='<div><span class="k">\u5730\u5740</span>'+esc(store.address)+'</div>';
    if(store.closed)    m+='<div><span class="k">\u516c\u4f11</span>'+esc(store.closed)+'</div>';
    if(store.min_order) m+='<div><span class="k">\u6700\u4f4e\u5916\u9001</span>'+esc(store.min_order)+'</div>';
    card.innerHTML='<h2>'+esc(storeName)+'<span class="tag">'+iso+'\uff08\u9031'+info.dow+'\uff09</span></h2><div class="store-meta">'+m+'</div>'+(store.note?'<div class="store-note">\uff0a '+esc(store.note)+'</div>':'');
    el.appendChild(card);
    var groups=[]; var gm={}; var FLAT='__flat__';
    items.forEach(function(item,idx){ var key=item.c===null?FLAT:item.c; if(!gm[key]){ gm[key]={name:item.c,items:[]}; groups.push(gm[key]); } gm[key].items.push({item:item,idx:idx}); });
    groups.forEach(function(group){ var section=document.createElement('div'); section.className='menu-section';
      if(group.name!==null){ var h3=document.createElement('h3'); h3.textContent=group.name; section.appendChild(h3); }
      var grid=document.createElement('div'); grid.className='menu-grid'; if(group.name===null) grid.style.marginTop='4px';
      group.items.forEach(function(pair){ var item=pair.item, idx=pair.idx; var qty=getQty(idx);
        var row=document.createElement('div'); row.className='item-row'+(qty>0?' active':'');
        row.innerHTML='<div class="item-info"><div class="item-name">'+esc(item.n)+'</div><div class="item-price">$'+item.p+'</div></div>'+
          '<div class="stepper"><button data-act="minus" data-idx="'+idx+'">\uff0d</button><div class="qty" data-qty="'+idx+'">'+qty+'</div><button data-act="plus" data-idx="'+idx+'">\uff0b</button></div>';
        grid.appendChild(row); });
      section.appendChild(grid); el.appendChild(section); });
  }
  function onStepperClick(e){ var btn=e.target.closest('button[data-act]'); if(!btn) return;
    var idx=parseInt(btn.dataset.idx,10); var items=MENUS[CAL[state.selectedDate]]||[]; var item=items[idx];
    var cur=getQty(idx); var next=btn.dataset.act==='plus'?cur+1:Math.max(0,cur-1); setQty(idx,item,next);
    var qtyEl=document.querySelector('.qty[data-qty="'+idx+'"]'); if(qtyEl) qtyEl.textContent=next;
    var row=btn.closest('.item-row'); if(row) row.classList.toggle('active', next>0); renderCart(); }
  function allCartEntries(){ return Object.keys(state.cart).map(function(k){ return state.cart[k]; }); }
  function renderCart(){
    var entries=allCartEntries().filter(function(e){ return e.date===state.selectedDate; }); var bar=$('cart-bar');
    if(state.tab!=='order' || entries.length===0){ bar.style.display='none'; $('cart-detail').classList.remove('open'); return; }
    bar.style.display='block'; var tq=0,tp=0; var listEl=$('cart-list'); listEl.innerHTML='';
    entries.forEach(function(e){ tq+=e.qty; tp+=e.qty*e.price; var li=document.createElement('li');
      li.innerHTML='<span class="n">'+esc(e.name)+' \u00d7 '+e.qty+'</span><span class="p">$'+(e.qty*e.price)+'</span>'; listEl.appendChild(li); });
    $('cart-count').textContent='\u5df2\u9078 '+entries.length+' \u9805\u30fb\u5171 '+tq+' \u4efd'; $('cart-total').textContent=tp;
  }

  function submitOrder(){
    var name=currentName();
    if(!name){ toast('\u8acb\u5148\u586b\u5beb\u59d3\u540d'); $('orderer-name').focus(); return; }
    var date=state.selectedDate; if(!date||!CAL[date]){ toast('\u8acb\u5148\u9078\u64c7\u65e5\u671f'); return; }
    var arr=allCartEntries().filter(function(e){ return e.date===date; }).map(function(e){ return {name:e.name,price:e.price,qty:e.qty}; });
    var note=(($('order-note').value)||'').trim();
    var sd=safeDateKey(date), sp=safePersonKey(name);
    db.ref('orderNotes/'+sd+'/'+sp).set((arr.length&&note)?note:null);
    db.ref('orders/'+sd+'/'+sp).set(arr.length?arr:null)
      .then(function(){ toast(arr.length?('\u2705 \u5df2\u9001\u51fa\uff01'+name+' \u7684\u8a02\u55ae\u5df2\u5b58\u5165\u96f2\u7aef'):'\u5df2\u6e05\u9664 '+name+' \u7684\u8a02\u55ae'); })
      .catch(function(e){ toast('\u9001\u51fa\u5931\u6557\uff1a'+e.message); });
  }
  function clearMine(){
    var date=state.selectedDate; var name=currentName();
    clearCartForDate(date); var ne=$('order-note'); if(ne) ne.value=''; renderContent(); renderCart();
    if(name&&date){ var sd=safeDateKey(date), sp=safePersonKey(name);
      db.ref('orders/'+sd+'/'+sp).set(null).catch(function(){}); db.ref('orderNotes/'+sd+'/'+sp).set(null).catch(function(){}); }
    toast('\u5df2\u6e05\u7a7a\u672c\u65e5\u9078\u8cfc');
  }

  // ---------------- admin ----------------
  function setAdmin(on){
    state.admin=on;
    try{ if(on) sessionStorage.setItem('bento_admin','1'); else sessionStorage.removeItem('bento_admin'); }catch(e){}
    var lb=$('lock-btn'); lb.textContent=on?'\ud83d\udd13':'\ud83d\udd12'; lb.classList.toggle('on',on);
    $('admin-bar').style.display=on?'flex':'none';

  var pendingUnlock=null;
  function askPassword(after){ pendingUnlock=after||null; $('pw-input').value=''; $('pw-err').textContent=''; $('pw-overlay').classList.add('show'); setTimeout(function(){ $('pw-input').focus(); },50); }
  function closePassword(){ $('pw-overlay').classList.remove('show'); }
  function tryUnlock(){ if($('pw-input').value===ADMIN_PASSWORD){ setAdmin(true); closePassword(); var f=pendingUnlock; pendingUnlock=null; if(f) f(); else toast('\u2705 \u5df2\u89e3\u9396\u7ba1\u7406\u6a21\u5f0f'); } else { $('pw-err').textContent='\u5bc6\u78bc\u932f\u8aa4'; } }

  // proxy ordering (代人訂購)
  function startProxy(){
    var nm=window.prompt('\u4ee3\u8ab0\u8a02\u8cfc\uff1f\u8acb\u8f38\u5165\u5c0d\u65b9\u59d3\u540d\uff1a'); if(nm==null) return; nm=nm.trim(); if(!nm){ toast('\u59d3\u540d\u4e0d\u53ef\u7a7a\u767d'); return; }
    state.proxyName=nm; $('orderer-name').disabled=true;
    var b=$('proxy-banner'); b.style.display='block';
    b.innerHTML='\ud83e\uddd1\u200d\ud83d\udcbc \u6b63\u5728\u4ee3\u300c'+esc(nm)+'\u300d\u8a02\u8cfc\uff0c\u9078\u597d\u5f8c\u6309\u9001\u51fa\uff1b\u5b8c\u6210\u8acb\u6309 <button class="btn-mini" id="proxy-end">\u7d50\u675f\u4ee3\u8a02</button>';
    $('proxy-end').addEventListener('click', endProxy);
    loadMyOrder(); renderContent(); renderCart(); toast('\u4ee3\u8a02\uff1a'+nm);
  }
  function endProxy(){
    if(!state.proxyName){ $('proxy-banner').style.display='none'; return; }
    state.proxyName=null; $('orderer-name').disabled=false; $('proxy-banner').style.display='none';
    loadMyOrder(); renderContent(); renderCart();
  }
  function deletePersonOrder(date,person){
    if(!window.confirm('\u78ba\u5b9a\u522a\u9664\u300c'+person+'\u300d\u5728 '+date+' \u7684\u8a02\u55ae\uff1f')) return;
    var sd=safeDateKey(date), sp=safePersonKey(person);
    db.ref('orders/'+sd+'/'+sp).set(null); db.ref('orderNotes/'+sd+'/'+sp).set(null);
    if(paid[date]){ delete paid[date][person]; delete paid[date][person+'_note']; db.ref('paid').set(paid); }
    toast('\u5df2\u522a\u9664 '+person+' \u7684\u8a02\u55ae');
  }
  function clearDay(date){
    if(!window.confirm('\u78ba\u5b9a\u6e05\u7a7a '+date+' \u5168\u90e8\u8a02\u55ae\uff1f\u6b64\u52d5\u4f5c\u7121\u6cd5\u5fa9\u539f\u3002')) return;
    var sd=safeDateKey(date);
    db.ref('orders/'+sd).set(null); db.ref('orderNotes/'+sd).set(null);

    toast('\u5df2\u6e05\u7a7a '+date+' \u5168\u90e8\u8a02\u55ae');
  }

  // ---------------- stats ----------------
  function calcItemStats(allOrders){ var stats={}; Object.keys(allOrders).forEach(function(p){ var items=allOrders[p]; if(!Array.isArray(items)) return;
    items.forEach(function(i){ if(!stats[i.name]) stats[i.name]={qty:0,price:i.price}; stats[i.name].qty+=i.qty; }); }); return stats; }

  // ---------------- summary ----------------
  function renderSummary(){
    var el=$('view-summary'); var dates=datesWithOrders();
    if(!dates.length){ el.innerHTML='<div class="empty-note">\u76ee\u524d\u9084\u6c92\u6709\u4efb\u4f55\u8a02\u55ae\u3002<br>\u5230\u300c\u8a02\u8cfc\u300d\u9801\u9001\u51fa\u8a02\u55ae\u5f8c\uff0c\u9019\u88e1\u6703\u51fa\u73fe\u7d71\u8a08\u3002</div>'; return; }
    if(!state.sumDate || dates.indexOf(state.sumDate)===-1){ var t=todayISO(); state.sumDate=dates.indexOf(t)!==-1?t:dates[dates.length-1]; }
    var date=state.sumDate;
    var chips=dates.map(function(d){ var p=d.split('-'); return '<button class="date-chip'+(d===date?' selected':'')+'" data-date="'+d+'">'+parseInt(p[1],10)+'/'+parseInt(p[2],10)+'</button>'; }).join('');
    var allOrders=orders[date]||{}; var stats=calcItemStats(allOrders);
    var people=Object.keys(allOrders).filter(function(p){ return Array.isArray(allOrders[p])&&allOrders[p].length>0; });
    var total=0;
    var statRows=Object.keys(stats).map(function(name){ var s=stats[name]; var amt=s.price*s.qty; total+=amt;
      return '<div class="srow"><div><div class="nm">'+esc(name)+'</div></div><div style="display:flex;align-items:center;gap:14px"><span class="qty-badge">\u00d7'+s.qty+'</span><span class="amt">$'+amt+'</span></div></div>'; }).join('');
    var personRows=people.map(function(p){ var items=allOrders[p]; var amt=personTotal(items);
      var pnote=(notes[date]&&notes[date][p])?notes[date][p]:'';
      var sub=items.map(function(i){ return i.name+(i.qty>1?' \u00d7'+i.qty:''); }).join('\u3001')+(pnote?'\u3000\ud83d\udcdd '+esc(pnote):'');
      var delBtn=state.admin?'<button class="del-person" data-date="'+date+'" data-person="'+esc(p)+'" title="\u522a\u9664">\ud83d\uddd1</button>':'';
      return '<div class="srow"><div><div class="nm">'+esc(p)+'</div><div class="sub">'+sub+'</div></div><div style="display:flex;align-items:center"><span class="amt">$'+amt+'</span>'+delBtn+'</div></div>'; }).join('');
    var noteRows=people.filter(function(p){ return notes[date]&&notes[date][p]; }).map(function(p){

    var clearBtn=state.admin?'<button class="clear-day-btn" data-date="'+date+'">\ud83d\uddd1 \u6e05\u7a7a\u672c\u65e5\u5168\u90e8\u8a02\u55ae</button>':'';
    el.innerHTML='<div class="date-chips">'+chips+'</div><div class="panel">'+
      '<div class="panel-title">'+esc(CAL[date]||'')+'\u3000<span style="font-size:13px;color:var(--muted);font-weight:600">'+date+'</span></div>'+
      '<div class="panel-sub">\ud83d\udccb \u54c1\u9805\u7d71\u8a08\uff08\u7d66\u5e97\u5bb6\uff09</div>'+(statRows||'<div class="srow"><div class="sub">\u7121</div></div>')+
      '<div class="grand"><span>\u5408\u8a08</span><span class="amt">$'+total+'</span></div>'+
      (noteRows?'<div class="panel-sub">\ud83d\udcdd \u7279\u6b8a\u8981\u6c42</div>'+noteRows:'')+
      '<div class="panel-sub">\ud83d\udc64 \u500b\u4eba\u660e\u7d30\uff08\u6536\u9322\u7528\uff09</div>'+personRows+
      '<button class="btn btn-primary copy-sum" data-date="'+date+'" style="margin-top:18px">\u8907\u88fd\u8a02\u55ae\u6458\u8981</button>'+clearBtn+'</div>';
  }
  function copySummary(date){
    var shop=CAL[date]||''; var dp=date.split('-'); var allOrders=orders[date]||{}; var stats=calcItemStats(allOrders); var total=0;
    var text='\ud83d\udce6 '+parseInt(dp[1],10)+'/'+parseInt(dp[2],10)+' '+shop+'\n'+Array(23).join('\u2500')+'\n\u3010\u54c1\u9805\u7d71\u8a08\u3011\n';
    Object.keys(stats).forEach(function(name){ var s=stats[name]; var amt=s.price*s.qty; total+=amt; text+=name+' \u00d7'+s.qty+'\u3000$'+amt+'\n'; });
    text+='\u5408\u8a08\uff1a$'+total+'\n'+Array(23).join('\u2500')+'\n\u3010\u500b\u4eba\u660e\u7d30\u3011\n';
    Object.keys(allOrders).forEach(function(p){ var items=allOrders[p]; if(!Array.isArray(items)||!items.length) return; var pn=(notes[date]&&notes[date][p])?('\uff08'+notes[date][p]+'\uff09'):''; text+=p+'\u3000$'+personTotal(items)+pn+'\n'; });
    if(navigator.clipboard&&navigator.clipboard.writeText){ navigator.clipboard.writeText(text).then(function(){ toast('\u5df2\u8907\u88fd\u8a02\u55ae\u6458\u8981'); },function(){ toast('\u8907\u88fd\u5931\u6557'); }); }
    else { toast('\u6b64\u88dd\u7f6e\u4e0d\u652f\u63f4\u81ea\u52d5\u8907\u88fd'); }
  }

  // ---------------- payment ----------------
  function renderPayment(){
    var el=$('view-payment'); var dates=datesWithOrders();
    if(!dates.length){ el.innerHTML='<div class="empty-note">\u76ee\u524d\u9084\u6c92\u6709\u4efb\u4f55\u8a02\u55ae\u3002</div>'; return; }
    if(!state.payDate || dates.indexOf(state.payDate)===-1){ var t=todayISO(); state.payDate=dates.indexOf(t)!==-1?t:dates[dates.length-1]; }
    var date=state.payDate;
    var chips=dates.map(function(d){ var p=d.split('-'); return '<button class="date-chip'+(d===date?' selected':'')+'" data-date="'+d+'">'+parseInt(p[1],10)+'/'+parseInt(p[2],10)+'</button>'; }).join('');
    var allOrders=orders[date]||{}; var people=Object.keys(allOrders).filter(function(p){ return Array.isArray(allOrders[p])&&allOrders[p].length>0; });
    var pd=paid[date]||{}; var totalAmt=0,paidAmt=0,unpaid=[];

    var rows=people.map(function(p){ var amt=personTotal(allOrders[p]); var on=!!pd[p]; var note=pd[p+'_note']||'';

        '<div class="pinfo"><div class="pname">'+esc(p)+'</div><div class="pitems">'+esc(allOrders[p].map(function(i){ return i.name+(i.qty>1?' \u00d7'+i.qty:''); }).join('\u3001'))+'</div>'+
        '<input class="pay-note" data-date="'+date+'" data-person="'+esc(p)+'" placeholder="\u5099\u8a3b\uff08\u627e\u9322\uff0f\u6b20\u6b3e\uff09" value="'+esc(note)+'" style="margin-top:6px;width:100%;box-sizing:border-box;border:1px solid var(--line);border-radius:6px;padding:6px 9px;font-size:12px;font-family:inherit;background:var(--paper);color:var(--ink);outline:none"></div>'+
        '<div class="pamt">$'+amt+'</div></div>'; }).join('');
    var unpaidBox=unpaid.length?'<div class="unpaid-box"><div class="t">\u26a0\ufe0f \u5c1a\u672a\u4ed8\u6b3e\uff08'+unpaid.length+' \u4eba\uff09</div>'+unpaid.map(function(u){ return '<span class="unpaid-chip">'+esc(u[0])+' $'+u[1]+'</span>'; }).join('')+'</div>':'<div class="allpaid">\u2705 \u4eca\u65e5\u5df2\u5168\u90e8\u6536\u6b3e\u5b8c\u7562\uff01</div>';
    el.innerHTML='<div class="date-chips">'+chips+'</div><div class="panel">'+
      '<div class="panel-title">'+esc(CAL[date]||'')+'\u3000<span style="font-size:13px;color:var(--muted);font-weight:600">'+date+'</span></div>'+
      '<div class="pay-stats"><div class="pay-stat"><div class="lab">\u61c9\u6536</div><div class="val blue">$'+totalAmt+'</div></div>'+
      '<div class="pay-stat"><div class="lab">\u5df2\u6536</div><div class="val green">$'+paidAmt+'</div></div>'+
      '<div class="pay-stat"><div class="lab">\u672a\u6536</div><div class="val orange">$'+(totalAmt-paidAmt)+'</div></div></div>'+
      (rows||'<div class="empty-note">\u6b64\u65e5\u7121\u8a02\u55ae</div>')+unpaidBox+'</div>';
  }
  function togglePaid(date,person){ if(!paid[date]) paid[date]={}; paid[date][person]=!paid[date][person]; db.ref('paid').set(paid).catch(function(e){ toast('\u5132\u5b58\u5931\u6557\uff1a'+e.message); }); }
  function savePayNote(date,person,note){ if(!paid[date]) paid[date]={}; if(note) paid[date][person+'_note']=note; else delete paid[date][person+'_note']; db.ref('paid').set(paid).catch(function(){}); }

  // ---------------- tabs ----------------
  function switchTab(tab){
    if(tab==='payment' && !state.admin){ askPassword(function(){ switchTab('payment'); }); return; }
    state.tab=tab;
    document.querySelectorAll('.tab-btn').forEach(function(b){ b.classList.toggle('active', b.dataset.tab===tab); });
    $('view-order').classList.toggle('active', tab==='order');
    $('view-summary').classList.toggle('active', tab==='summary');
    $('view-payment').classList.toggle('active', tab==='payment');
    if(tab==='order'){ renderCart(); } else { $('cart-bar').style.display='none'; $('cart-detail').classList.remove('open'); }
    if(tab==='summary') renderSummary();
    if(tab==='payment') renderPayment();
    window.scrollTo(0,0);
  }

  // ---------------- wire ----------------
  $('content').addEventListener('click', onStepperClick);
  $('cart-toggle').addEventListener('click', function(e){ if(e.target.closest('.btn')) return; $('cart-detail').classList.toggle('open'); });
  $('clear-btn').addEventListener('click', clearMine);
  $('submit-btn').addEventListener('click', submitOrder);
  document.querySelectorAll('.tab-btn').forEach(function(b){ b.addEventListener('click', function(){ switchTab(b.dataset.tab); }); });
  $('lock-btn').addEventListener('click', function(){ if(state.admin){ setAdmin(false); toast('\u5df2\u9396\u5b9a\u7ba1\u7406\u6a21\u5f0f'); } else { askPassword(null); } });
  $('proxy-btn').addEventListener('click', startProxy);
  $('pw-ok').addEventListener('click', tryUnlock);
  $('pw-cancel').addEventListener('click', function(){ closePassword(); pendingUnlock=null; });
  $('pw-input').addEventListener('keydown', function(e){ if(e.key==='Enter') tryUnlock(); });

  $('view-summary').addEventListener('click', function(e){
    var chip=e.target.closest('.date-chip'); if(chip){ state.sumDate=chip.dataset.date; renderSummary(); return; }
    var cp=e.target.closest('.copy-sum'); if(cp){ copySummary(cp.dataset.date); return; }
    var dp=e.target.closest('.del-person'); if(dp){ deletePersonOrder(dp.dataset.date, dp.dataset.person); return; }
    var cd=e.target.closest('.clear-day-btn'); if(cd){ clearDay(cd.dataset.date); }
  });
  $('view-payment').addEventListener('click', function(e){
    var chip=e.target.closest('.date-chip'); if(chip){ state.payDate=chip.dataset.date; renderPayment(); return; }
    var pc=e.target.closest('.pay-check'); if(pc){ togglePaid(pc.dataset.date, pc.dataset.person); }
  });
  $('view-payment').addEventListener('change', function(e){ var ni=e.target.closest('.pay-note'); if(ni){ savePayNote(ni.dataset.date, ni.dataset.person, ni.value.trim()); } });

  var nameInput=$('orderer-name');
  try{ var saved=localStorage.getItem('bento_name'); if(saved) nameInput.value=saved; }catch(err){}
  nameInput.addEventListener('change', function(){ if(state.proxyName) return; try{ localStorage.setItem('bento_name', (nameInput.value||'').trim()); }catch(err){}
    if(state.tab==='order'){ loadMyOrder(); renderContent(); renderCart(); } });

  try{ if(sessionStorage.getItem('bento_admin')==='1') setAdmin(true); }catch(e){}
  buildCalendar();
  initFirebase();
})();
</script>

<div class="pw-overlay" id="pw-overlay"><div class="pw-box"><div class="pw-title">🔒 管理密碼</div><input id="pw-input" type="password" placeholder="請輸入管理密碼" autocomplete="off"><div class="pw-err" id="pw-err"></div><div class="pw-actions"><button id="pw-cancel">取消</button><button id="pw-ok">確定</button></div></div></div>
<div id="loading-bar"></div>
<div id="toast"></div>
</body>
</html>
